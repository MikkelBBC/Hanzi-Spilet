<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Hanzi Lad Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none}
canvas#cv{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.pix{font-family:'Press Start 2P',monospace}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:none;padding:6px 10px;background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(0,0,0,.4) 85%,transparent);pointer-events:none}
#hud.show{display:block}
.hr{display:flex;justify-content:space-between;align-items:flex-start}
.hl{display:flex;flex-direction:column;gap:2px}
.hb{display:flex;align-items:center;gap:3px}
.hb .l{font-family:'Press Start 2P';font-size:clamp(7px,1.8vw,10px);width:24px;text-align:right}
.hb .t{width:clamp(50px,12vw,90px);height:8px;background:rgba(255,255,255,.08);overflow:hidden;border-radius:3px}
.hb .f{height:100%;transition:width .4s;border-radius:3px}
.hb .v{font-family:'Press Start 2P';font-size:clamp(6px,1.5vw,9px);min-width:22px}
.hstats{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
.hs{display:flex;align-items:center;gap:2px}
.hs .si{font-size:clamp(7px,1.5vw,10px)}
.hs .sl{font-family:'Press Start 2P';font-size:clamp(6px,1.4vw,8px);opacity:.5}
.hs .sv{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);font-weight:700}
.hright{text-align:right;display:flex;flex-direction:column;gap:1px}
.hright .ck{font-family:'Press Start 2P';font-size:clamp(9px,2.2vw,13px);color:#ffbe0b}
.hright .dy{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);color:#ff006e}
.hright .mn{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);color:#00d4aa}

/* MSG */
.msg-bar{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);max-width:420px;width:90%;z-index:12;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
.msg-bar.show{opacity:1}
.msg-bar .msg{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);padding:10px 14px;background:rgba(0,0,0,.92);border:1px solid rgba(255,255,255,.08);line-height:1.8}

/* OVERLAYS */
.ov{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;background:rgba(5,5,15,.96)}
.ov.active{display:flex}
.ov-t{font-family:'Press Start 2P';font-size:clamp(8px,2vw,11px);margin:8px 0 3px;letter-spacing:1px}
.ov-s{font-family:'Press Start 2P';font-size:clamp(6px,1.4vw,8px);color:#aaa;margin-bottom:10px;text-align:center;line-height:1.8}

/* BTNS */
.btn{font-family:'Press Start 2P';font-size:clamp(8px,1.8vw,11px);padding:11px 20px;border:2px solid #ff006e;background:transparent;color:#ff006e;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn:active{background:#ff006e;color:#fff;transform:scale(.95)}
.btn-s{font-size:clamp(7px,1.5vw,9px);padding:8px 14px}

/* GYM GRID */
.gym-g{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;max-width:340px;width:100%}
.gym-c{padding:10px 6px;border:2px solid rgba(255,255,255,.08);background:rgba(0,0,0,.5);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.gym-c:active{border-color:#ff006e;transform:scale(.96)}
.gym-c .gi{font-size:1.4rem}.gym-c .gn{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px)}
.gym-c .gd{font-family:'Press Start 2P';font-size:clamp(6px,1.2vw,8px);color:#aaa;line-height:1.6}
.gym-c .gl{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);color:#ffbe0b}

/* SHOP */
.stabs{display:flex;gap:3px;margin-bottom:8px}
.stab{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);padding:6px 12px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#888;cursor:pointer;-webkit-tap-highlight-color:transparent}
.stab.act{border-color:#ffbe0b;color:#ffbe0b;background:rgba(255,190,11,.06)}
.slist{display:flex;flex-direction:column;gap:5px;max-width:360px;width:100%;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.si{padding:8px 10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.015);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.si:active{border-color:#ffbe0b;transform:scale(.98)}
.si.dis{opacity:.18;pointer-events:none}
.si-l{display:flex;align-items:center;gap:6px}
.si-i{font-size:1rem}.si-n{font-size:clamp(7px,1.6vw,10px);font-weight:700}
.si-d{font-family:'Press Start 2P';font-size:clamp(6px,1.2vw,8px);color:#888;margin-top:1px}
.si-p{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);color:#ffbe0b}

/* SKILL TREE */
.tree{max-width:380px;width:100%;max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tree-row{display:flex;justify-content:center;gap:6px;margin-bottom:4px}
.tree-con{display:flex;justify-content:center;margin-bottom:4px}
.tree-line{width:2px;height:10px;background:rgba(255,190,11,.15)}
.tree-split{display:flex;gap:40px;justify-content:center;align-items:flex-start}
.tree-split .tree-line{width:2px;height:10px}
.tn{padding:8px 10px;border:2px solid rgba(255,190,11,.12);background:rgba(255,190,11,.02);cursor:pointer;text-align:center;min-width:clamp(80px,22vw,110px);transition:all .2s;-webkit-tap-highlight-color:transparent}
.tn.on{border-color:#ffbe0b;background:rgba(255,190,11,.1)}
.tn.off{opacity:.3;cursor:default}
.tn:active:not(.off):not(.on){border-color:#ff006e;transform:scale(.97)}
.tn .ti{font-size:1.1rem}.tn .tt{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);margin-top:2px}
.tn .td{font-family:'Press Start 2P';font-size:clamp(5px,1.1vw,7px);color:#888;margin-top:2px;line-height:1.5}
.tn .tc{font-family:'Press Start 2P';font-size:clamp(6px,1.2vw,8px);margin-top:3px}

/* COMBAT */
.cui{position:fixed;inset:0;z-index:22;display:none;flex-direction:column}
.cui.active{display:flex}
.ctop{display:flex;justify-content:space-between;padding:6px 8px;background:rgba(0,0,0,.75);z-index:2}
.cbars{display:flex;flex-direction:column;gap:1px}
.cname{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);margin-bottom:2px}
.crow{display:flex;align-items:center;gap:4px}
.crow label{font-family:'Press Start 2P';font-size:clamp(5px,1vw,7px);width:18px}
.ctrk{width:clamp(60px,18vw,100px);height:7px;background:rgba(255,255,255,.08);overflow:hidden;border-radius:3px}
.ctrk .cf{height:100%;transition:width .3s;border-radius:3px}
.crow .cv{font-family:'Press Start 2P';font-size:clamp(5px,1vw,7px)}
.cmid{flex:1;position:relative;overflow:hidden}
.cact{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P';font-size:clamp(12px,3.5vw,18px);text-shadow:0 0 14px currentColor;opacity:0;transition:opacity .3s;pointer-events:none;z-index:3}
.cact.show{opacity:1}
/* Speech bubble */
.cspeech{position:absolute;top:12%;left:50%;transform:translateX(-50%);max-width:90%;width:90%;padding:14px 18px;background:rgba(0,0,0,.92);border:2px solid #ff006e;border-radius:12px;font-family:'Press Start 2P';font-size:clamp(8px,2.2vw,11px);line-height:2.2;text-align:center;z-index:3;opacity:0;transition:opacity .3s;pointer-events:none}
.cspeech.show{opacity:1}
.cspeech::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #ff006e}
.cbot{padding:6px;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);display:flex;flex-direction:column;align-items:center;gap:5px;z-index:2}
.ctiming{max-width:260px;width:78%;height:18px;background:rgba(255,255,255,.06);position:relative;display:none;margin-bottom:4px}
.ctiming .zone{position:absolute;height:100%;background:rgba(0,212,170,.22)}
.ctiming .needle{position:absolute;top:0;width:3px;height:100%;background:#fff;box-shadow:0 0 6px #fff}
.cmenu{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;max-width:340px;width:100%}
.cbtn{font-family:'Press Start 2P';font-size:clamp(6px,1.5vw,8px);padding:12px 6px;border:2px solid;background:rgba(0,0,0,.5);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.cbtn:active{transform:scale(.95)}
.cbtn .ci{font-size:1.1rem}.cbtn .cc{font-size:clamp(5px,1.1vw,7px);opacity:.5}
.citems{display:flex;gap:3px;max-width:340px;width:100%;overflow-x:auto;display:none}
.citem{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);padding:7px 10px;border:1px solid rgba(255,190,11,.25);background:rgba(255,190,11,.04);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.citem.dis{opacity:.25;pointer-events:none}

/* PHONE */
.phone-ov{position:fixed;inset:0;z-index:25;display:none;align-items:center;justify-content:center;background:#0a0a0f}
.phone-ov.active{display:flex}
.phone{width:min(300px,84vw);height:min(540px,80vh);background:#111;border-radius:20px;border:2px solid #222;overflow:hidden;display:flex;flex-direction:column}
.phtop{background:#0a0a0a;padding:8px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #222}
.phavi{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.phname{font-weight:700;font-size:.7rem}.phst{font-size:.45rem;color:#00d4aa}
.phmsgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;scroll-behavior:smooth}
.mb{max-width:80%;padding:6px 10px;border-radius:12px;font-size:clamp(.58rem,1.5vw,.7rem);line-height:1.5;animation:mIn .3s ease;word-wrap:break-word;white-space:pre-line}
.mb-in{background:#1a1a2e;border-bottom-left-radius:2px;align-self:flex-start;color:#ddd}
.mb-out{background:#ff006e;border-bottom-right-radius:2px;align-self:flex-end;color:#fff}
.mb-nar{background:transparent;align-self:center;color:#555;font-size:.5rem;font-style:italic}
.phbot{padding:8px;border-top:1px solid #222;display:flex;justify-content:center}
.phcont{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);padding:8px 18px;border:1px solid #ff006e;background:rgba(255,0,110,.08);color:#ff006e;cursor:pointer;-webkit-tap-highlight-color:transparent}
.phcont:active{background:#ff006e;color:#fff}

/* TITLE */
.title-ov{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,12,.95)}
.title-ov h1{font-family:'Press Start 2P';font-size:clamp(14px,4.5vw,28px);color:#ff006e;text-shadow:0 0 18px rgba(255,0,110,.4),0 2px 0 #aa0048;margin-bottom:3px;letter-spacing:2px}
.title-ov .sub{font-family:'Press Start 2P';font-size:clamp(4px,1.2vw,8px);color:#ffbe0b;letter-spacing:4px;margin-bottom:24px}

/* VIDEO */
#intro-vid{position:fixed;inset:0;z-index:40;width:100%;height:100%;object-fit:cover;display:none;background:#000}
#vid-skip{position:fixed;bottom:20px;right:20px;z-index:41;display:none}

/* FLOATS */
.float{position:fixed;font-family:'Press Start 2P';font-size:clamp(5px,1.4vw,8px);pointer-events:none;z-index:100;animation:fUp 1s ease forwards;text-shadow:0 0 8px currentColor}
@keyframes fUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-35px)}}
@keyframes mIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud"></div>
<div class="msg-bar" id="msg-bar"><div class="msg" id="msg-text"></div></div>

<!-- VIDEO -->
<video id="intro-vid" playsinline></video>
<button class="btn" id="vid-skip" onclick="skipVid()">SKIP в–¶</button>

<!-- LETH BRIEFING -->
<div class="ov" id="brief-ov" style="justify-content:center;background:rgba(5,5,12,.98)">
<canvas id="brief-cv" width="380" height="220" style="max-width:92%;margin-bottom:8px;border:1px solid rgba(255,255,255,.04)"></canvas>
<div class="pix" id="brief-name" style="font-size:clamp(7px,1.8vw,10px);color:#00d4aa;margin-bottom:4px"></div>
<div class="pix" id="brief-text" style="font-size:clamp(7px,1.6vw,10px);color:#ddd;max-width:340px;text-align:center;line-height:2;margin-bottom:10px"></div>
<div id="brief-girl" style="display:none;text-align:center;margin-bottom:10px">
<div class="pix" id="bg-icon" style="font-size:2.5rem;margin-bottom:4px"></div>
<div class="pix" id="bg-name" style="font-size:clamp(7px,1.8vw,10px);color:#ff006e;margin-bottom:3px"></div>
<div class="pix" id="bg-rating" style="font-size:clamp(10px,3vw,16px);color:#ffbe0b;margin-bottom:4px"></div>
<div class="pix" id="bg-stats" style="font-size:clamp(6px,1.3vw,8px);color:#aaa;line-height:2"></div>
</div>
<button class="btn btn-s" id="brief-btn" onclick="advBrief()">FORTSГҶT в–¶</button>
</div>

<!-- TITLE -->
<div class="title-ov" id="title-ov">
<h1>HANZI LAD</h1>
<div class="sub">SIMULATOR</div>
<button class="btn" id="start-btn">в–¶ START</button>
</div>

<!-- PHONE -->
<div class="phone-ov" id="phone-ov">
<div class="phone"><div class="phtop"><div class="phavi" style="background:#00d4aa;">L</div><div><div class="phname">Leth рҹ’Ә</div><div class="phst">Online</div></div></div>
<div class="phmsgs" id="ph-msgs"></div>
<div class="phbot"><button class="phcont" id="ph-next">FORTSГҶT в–¶</button></div></div>
</div>

<!-- GYM -->
<div class="ov" id="gym-ov">
<canvas id="gym-bg" width="400" height="160" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#ff006e">рҹ’Ә LETH'S GYM</div>
<div class="ov-s" id="gym-sub">Leth: "VГҰlg Гёvelse! Koster 20 sult."</div>
<div class="gym-g" id="gym-g"></div>
<button class="btn btn-s" style="margin-top:10px" onclick="closeOv()">вҶҗ TILBAGE</button>
</div>

<!-- TRAINING -->
<div class="ov" id="train-ov" style="justify-content:center;">
<div style="display:flex;justify-content:space-between;width:100%;max-width:340px;margin-bottom:4px;"><span class="pix" id="tt" style="font-size:clamp(5px,1.2vw,7px);color:#ff006e"></span><span class="pix" id="ts" style="font-size:clamp(5px,1.2vw,7px);color:#ffbe0b"></span></div>
<canvas id="tc" width="340" height="300" style="max-width:100%;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.4);"></canvas>
<div id="ti" class="pix" style="font-size:clamp(3.5px,.85vw,5px);color:#888;text-align:center;margin-top:4px"></div>
<div id="tr"></div>
</div>

<!-- SHOP -->
<div class="ov" id="shop-ov">
<canvas id="shop-bg" width="400" height="140" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#8b5cf6">GULLE'S SHOP</div>
<div class="ov-s">Gulle: "Alt er ГҰgte... mostly." рҹ•¶пёҸ</div>
<div class="stabs" id="shop-tabs"></div>
<div class="slist" id="shop-list"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#8b5cf6;color:#8b5cf6" onclick="closeOv()">вҶҗ TILBAGE</button>
</div>

<!-- WORK -->
<div class="ov" id="work-ov">
<canvas id="work-bg" width="400" height="140" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#00d4aa">RITARDO'S JOBS</div>
<div class="ov-s" id="work-sub"></div>
<div class="slist" id="work-list"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#00d4aa;color:#00d4aa" onclick="closeOv()">вҶҗ TILBAGE</button>
</div>

<!-- SKILL TREE -->
<div class="ov" id="tree-ov">
<div class="ov-t" style="color:#ffbe0b">рҹҢҹ CHARM SKILL TREE</div>
<div class="ov-s" id="tree-sub"></div>
<div class="tree" id="tree-w"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#ffbe0b;color:#ffbe0b" onclick="closeOv()">вҶҗ TILBAGE</button>
</div>

<!-- BODEGA -->
<div class="ov" id="bodega-ov" style="justify-content:center;background:rgba(5,5,15,.97)">
<canvas id="bodega-bg" width="400" height="160" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#f59e0b">рҹҚә BODEGA</div>
<div class="ov-s" id="bodega-sub">PrГёv din charm pГҘ de lokale!</div>
<div class="slist" id="bodega-list"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#f59e0b;color:#f59e0b" onclick="closeOv()">вҶҗ TILBAGE</button>
</div>

<!-- COMBAT -->
<div class="cui" id="combat-ui">
<div class="ctop"><div class="cbars" id="c-hanzi"></div><div class="cbars" id="c-girl"></div></div>
<div class="cmid" id="c-mid"><div class="cspeech" id="c-speech"></div><div class="cact" id="c-act"></div><canvas id="c-cv" style="position:absolute;inset:0;width:100%;height:100%;"></canvas></div>
<div class="cbot"><div class="ctiming" id="c-timing"><div class="zone" id="c-zone"></div><div class="needle" id="c-needle"></div></div><div class="cmenu" id="c-menu"></div><div class="citems" id="c-items"></div></div>
</div>

<!-- RESULT -->
<div class="ov" id="result-ov" style="justify-content:center;background:rgba(5,5,12,.97)"></div>

<script>
// ===== CANVAS =====
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
function rsz(){cv.width=innerWidth;cv.height=innerHeight;
const cc=document.getElementById('c-cv');if(cc){cc.width=cc.parentElement.clientWidth;cc.height=cc.parentElement.clientHeight;}}
addEventListener('resize',rsz);rsz();

// ===== AUDIO =====
const Mus={t:{},cur:null,init(){['map','fight','gym'].forEach(k=>{const a=new Audio('music/'+k+'.mp3');a.loop=true;a.volume=.22;a.preload='auto';this.t[k]=a;});},
play(k){if(this.cur===k)return;this.stop();this.cur=k;const t=this.t[k];if(t){t.currentTime=0;t.play().catch(()=>{});}},
stop(){Object.values(this.t).forEach(t=>{t.pause();t.currentTime=0;});this.cur=null;}};

const S={c:null,g:null,init(){this.c=new(window.AudioContext||window.webkitAudioContext)();this.g=this.c.createGain();this.g.gain.value=.18;this.g.connect(this.c.destination);},
n(f,d,t='square',v=.3){if(!this.c)return;const o=this.c.createOscillator(),g=this.c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,this.c.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.c.currentTime+d);o.connect(g);g.connect(this.g);o.start();o.stop(this.c.currentTime+d);},
click(){this.n(800,.04);setTimeout(()=>this.n(1100,.03),20);},
ok(){this.n(523,.08);setTimeout(()=>this.n(659,.08),60);setTimeout(()=>this.n(784,.1),120);},
bad(){this.n(300,.1,'sawtooth');setTimeout(()=>this.n(220,.12,'sawtooth'),80);},
perf(){this.n(784,.06);setTimeout(()=>this.n(988,.06),40);setTimeout(()=>this.n(1175,.1),80);},
coin(){for(let i=0;i<3;i++)setTimeout(()=>this.n(800+i*250,.04,'sine'),i*30);},
hit(){this.n(180,.07,'sawtooth',.25);},heal(){this.n(440,.06,'sine');setTimeout(()=>this.n(660,.06,'sine'),50);setTimeout(()=>this.n(880,.08,'sine'),100);},
eat(){this.n(300,.05,'sine');setTimeout(()=>this.n(500,.05,'sine'),40);}};

// ===== GAME STATE =====

];
let blds=bldsImg.map(b=>({...b,x:b.ix,y:b.iy,w:b.iw,h:b.ih}));
let cropSX=0,cropSY=0,cropSW=1,cropSH=1;
function updateBldPositions(){
    blds=bldsImg.map(b=>{
        const x=(b.ix-cropSX)/cropSW;
        const y=(b.iy-cropSY)/cropSH;
        const w=b.iw/cropSW;
        const h=b.ih/cropSH;
        return {...b,x,y,w,h};
    });
}

// ===== TOP-DOWN MAP =====
let mapT=0;
let mapOX=0,mapOY=0,mapDW=0,mapDH=0;

function drawMap(){
    mapT+=.005;const W=cv.width,H=cv.height;
    cx.fillStyle='#4a8c5c';cx.fillRect(0,0,W,H);
    // Draw map image - portrait: cover (immersive), landscape: contain (show all)
    if(mapReady){
        const imgR=mapImg.width/mapImg.height,cvR=W/H;
        const isPortrait=H>W;
        let dx=0,dy=0,dw=W,dh=H;
        if(isPortrait){
            // Cover mode biased left for mobile
            let sx=0,sy=0,sw=mapImg.width,sh=mapImg.height;
            if(imgR>cvR){const nw=mapImg.height*cvR;sx=Math.max(0,(mapImg.width-nw)*.15);sw=nw;}
            else{const nh=mapImg.width/cvR;sy=Math.max(0,(mapImg.height-nh)*.3);sh=nh;}
            cx.drawImage(mapImg,sx,sy,sw,sh,0,0,W,H);
            const newSX=sx/mapImg.width,newSY=sy/mapImg.height;
            const newSW=sw/mapImg.width,newSH=sh/mapImg.height;
            if(Math.abs(newSX-cropSX)>.001||Math.abs(newSW-cropSW)>.001){cropSX=newSX;cropSY=newSY;cropSW=newSW;cropSH=newSH;updateBldPositions();}
        } else {
            // Contain mode for desktop
            if(imgR>cvR){dh=W/imgR;dy=(H-dh)/2;dw=W;}
            else{dw=H*imgR;dx=(W-dw)/2;dh=H;}
            cx.fillStyle='#4a7a3a';cx.fillRect(0,0,W,H);
            cx.drawImage(mapImg,0,0,mapImg.width,mapImg.height,dx,dy,dw,dh);
            const newSX=-dx/dw,newSY=-dy/dh,newSW=W/dw,newSH=H/dh;
            if(Math.abs(newSX-cropSX)>.001||Math.abs(newSW-cropSW)>.001||Math.abs(newSY-cropSY)>.001||Math.abs(newSH-cropSH)>.001){cropSX=newSX;cropSY=newSY;cropSW=newSW;cropSH=newSH;updateBldPositions();}
        }
    }
    // Highlight buildings on hover proximity
    blds.forEach(b=>{
        const bx=b.x*W,by=b.y*H,bw=b.w*W,bh=b.h*H;
        const dx2=G.px-(b.x+b.w/2),dy2=G.py-(b.y+b.h/2);
        const near=Math.sqrt(dx2*dx2+dy2*dy2)<.1;
        if(near){
            cx.strokeStyle='rgba(255,190,11,.6)';cx.lineWidth=3;
            cx.shadowColor='#ffbe0b';cx.shadowBlur=8;
            cx.strokeRect(bx-2,by-2,bw+4,bh+4);cx.shadowBlur=0;
        }
        if(b.id==='club'){const gl=Math.sin(mapT*4)*.3+.4;cx.shadowColor='#7c3aed';cx.shadowBlur=6;cx.strokeStyle=`rgba(124,58,237,${gl})`;cx.lineWidth=2;cx.strokeRect(bx-1,by-1,bw+2,bh+2);cx.shadowBlur=0;}
        if(b.id==='bodega'){const gl=Math.sin(mapT*3)*.2+.3;cx.shadowColor='#f59e0b';cx.shadowBlur=5;cx.strokeStyle=`rgba(245,158,11,${gl})`;cx.lineWidth=2;cx.strokeRect(bx-1,by-1,bw+2,bh+2);cx.shadowBlur=0;}
    });
    // Hanzi (top-down sprite) - bigger on mobile
    const hx=G.px*W,hy=G.py*H;
    const bob=G.walking?Math.sin(Date.now()*.015)*2:0;
    const sz=Math.max(10,W*.025);
    // Shadow
    cx.fillStyle='rgba(0,0,0,.5)';cx.beginPath();cx.ellipse(hx,hy+sz*.8,sz*.9,sz*.4,0,0,Math.PI*2);cx.fill();
    // Glow ring
    cx.strokeStyle='rgba(255,0,110,.5)';cx.lineWidth=3;cx.shadowColor='#ff006e';cx.shadowBlur=10;
    cx.beginPath();cx.arc(hx,hy+bob,sz*1.4,0,Math.PI*2);cx.stroke();cx.shadowBlur=0;
    // Body
    cx.fillStyle='#475569';cx.beginPath();cx.arc(hx,hy+bob,sz,0,Math.PI*2);cx.fill();
    // Head
    cx.fillStyle='#c68642';cx.beginPath();cx.arc(hx,hy-sz*.7+bob,sz*.65,0,Math.PI*2);cx.fill();
    // Hair
    cx.fillStyle='#111';cx.beginPath();cx.arc(hx,hy-sz*1.05+bob,sz*.65,Math.PI,Math.PI*2);cx.fill();
    // Name tag
    cx.font=`bold ${Math.max(7,W*.018)}px 'Press Start 2P'`;cx.textAlign='center';
    cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(hx-20,hy-sz*1.8+bob-2,40,10);
    cx.fillStyle='#ff006e';cx.fillText('HANZI',hx,hy-sz*1.8+bob+6);
    // Direction indicator
    if(G.walking){
        cx.fillStyle='rgba(255,0,110,.5)';cx.beginPath();cx.arc(G.tx*W,G.ty*H,6,0,Math.PI*2);cx.fill();
        cx.strokeStyle='rgba(255,0,110,.3)';cx.lineWidth=2;cx.beginPath();cx.arc(G.tx*W,G.ty*H,10+Math.sin(mapT*8)*3,0,Math.PI*2);cx.stroke();
    }
    // Walk
    if(G.walking){
        const dx=G.tx-G.px,dy=G.ty-G.py,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<.015){G.walking=false;G.px=G.tx;G.py=G.ty;onArrived();}
        else{const spd=.006;G.px+=dx/dist*spd;G.py+=dy/dist*spd;}
    }
}

// ===== CLICK MAP =====
cv.addEventListener('click',e=>{
    if(G.scene!=='map'||G.walking)return;
    const rx=e.clientX/cv.width,ry=e.clientY/cv.height;
    // Check building click
    for(const b of blds){
        if(rx>=b.x-.02&&rx<=b.x+b.w+.02&&ry>=b.y-.02&&ry<=b.y+b.h+.02){
            S.click();goTo(b);return;
        }
    }
});

let arriveId=null;
function goTo(b){
    arriveId=b.id;G.tx=b.x+b.w/2;G.ty=b.y+b.h+.04;G.walking=true;
}

function onArrived(){
    const id=arriveId;arriveId=null;
    switch(id){
        case'gym':if(G.hunger<20){msg('For sulten til at trГҰne! Spis noget.');return;}openGym();break;
        case'shop':openShop();break;
        case'tree':openTree();break;
        case'work':openWork();break;
        case'rest':doRest();break;
        case'bodega':openBodega();break;
        case'club':
            if(G.daysLeft>0){msg('Klubben ГҘbner om '+G.daysLeft+' dage!');return;}
            goClub();break;
    }
}

// ===== NPC DRAWING =====
function drawNPC(ctx,x,y,type,t){
    const s=1;ctx.save();ctx.translate(x,y);
    const bob=Math.sin(t*3)*1.5;
    if(type==='leth'){
        // Muscular guy
        ctx.fillStyle='#c68642';ctx.beginPath();ctx.arc(0,-22+bob,8,0,Math.PI*2);ctx.fill();// head
        ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,-28+bob,8,Math.PI,Math.PI*2);ctx.fill();// hair
        ctx.fillStyle='#dc2626';ctx.fillRect(-10,-14+bob,20,18);// red tank top
        ctx.fillStyle='#c68642';ctx.fillRect(-14,-12+bob,5,14);ctx.fillRect(9,-12+bob,5,14);// big arms
        ctx.fillStyle='#1e293b';ctx.fillRect(-6,4+bob,5,12);ctx.fillRect(1,4+bob,5,12);// legs
    } else if(type==='gulle'){
        ctx.fillStyle='#c68642';ctx.beginPath();ctx.arc(0,-20+bob,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#333';ctx.fillRect(-8,-28+bob,16,6);// hat
        ctx.fillStyle='#8b5cf6';ctx.fillRect(-8,-13+bob,16,16);// purple jacket
        ctx.fillStyle='#1e293b';ctx.fillRect(-5,3+bob,4,10);ctx.fillRect(1,3+bob,4,10);
        // sunglasses
        ctx.fillStyle='#000';ctx.fillRect(-5,-22+bob,4,3);ctx.fillRect(1,-22+bob,4,3);
    } else if(type==='ritardo'){
        ctx.fillStyle='#c68642';ctx.beginPath();ctx.arc(0,-20+bob,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#555';ctx.beginPath();ctx.arc(0,-24+bob,7,Math.PI,Math.PI*2);ctx.fill();
        ctx.fillStyle='#059669';ctx.fillRect(-7,-13+bob,14,15);// green shirt
        ctx.fillStyle='#1e293b';ctx.fillRect(-5,2+bob,4,10);ctx.fillRect(1,2+bob,4,10);
        // clipboard
        const cb=Math.sin(t*2)*2;
        ctx.fillStyle='#a0855c';ctx.fillRect(8,-8+bob+cb,6,8);
    } else if(type==='girl'){
        ctx.fillStyle='#f0c8a0';ctx.beginPath();ctx.arc(0,-20+bob,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#a0522d';ctx.beginPath();ctx.arc(0,-24+bob,8,Math.PI,.05);ctx.fill();// hair
        ctx.fillStyle='#ff006e';ctx.fillRect(-6,-13+bob,12,14);// dress
        ctx.fillStyle='#f0c8a0';ctx.fillRect(-3,1+bob,3,10);ctx.fillRect(0,1+bob,3,10);
    }
    ctx.restore();
}

function drawGymBg(){

    x.fillStyle='#1a0a0a';x.fillRect(0,0,W,H);
    // Floor
    x.fillStyle='#2a1515';x.fillRect(0,H*.7,W,H*.3);
    // Equipment
    x.fillStyle='#444';x.fillRect(20,H*.4,15,H*.3);x.fillRect(15,H*.4,25,5);// rack
    x.fillStyle='#555';x.fillRect(W-50,H*.45,30,8);x.fillRect(W-55,H*.5,5,H*.2);x.fillRect(W-25,H*.5,5,H*.2);// bench
    // Leth
    drawNPC(x,W*.3,H*.75,'leth',t);
    // Weights on floor
    x.fillStyle='#333';x.beginPath();x.arc(60,H*.8,6,0,Math.PI*2);x.fill();
    x.beginPath();x.arc(70,H*.82,5,0,Math.PI*2);x.fill();

    x.fillStyle='rgba(100,150,200,.06)';x.fillRect(100,H*.2,80,H*.45);x.strokeStyle='rgba(255,255,255,.08)';x.strokeRect(100,H*.2,80,H*.45);
}

function drawShopBg(){
    const c=document.getElementById('shop-bg'),x=c.getContext('2d'),W=c.width,H=c.height,t=Date.now()*.001;
    x.fillStyle='#0f0520';x.fillRect(0,0,W,H);

    // Shelves
    for(let i=0;i<3;i++){x.fillStyle='#2a1a40';x.fillRect(20+i*120,H*.2,80,5);x.fillRect(20+i*120,H*.45,80,5);
        for(let j=0;j<4;j++){x.fillStyle=`hsl(${(i*80+j*60)%360},40%,30%)`;x.fillRect(28+i*120+j*18,H*.25,12,18);}}

function drawWorkBg(){
    const c=document.getElementById('work-bg'),x=c.getContext('2d'),W=c.width,H=c.height,t=Date.now()*.001;
    x.fillStyle='#0a1510';x.fillRect(0,0,W,H);

    x.fillStyle='#3a3020';x.fillRect(50,H*.5,100,8);
    x.fillStyle='#2a2015';x.fillRect(55,H*.58,5,H*.2);x.fillRect(140,H*.58,5,H*.2);
    // Boxes
    x.fillStyle='#5a4020';x.fillRect(W-80,H*.5,25,20);x.fillRect(W-50,H*.45,20,25);x.fillRect(W-70,H*.35,15,15);

}

    document.getElementById('gym-sub').textContent=`Leth: "VГҰlg Гёvelse! Koster 20 sult." | Sult: ${G.hunger}`;
    const g=document.getElementById('gym-g');g.innerHTML='';
    exercises.forEach(ex=>{
        const c=document.createElement('div');c.className='gym-c';
        c.innerHTML=`<div class="gi">${ex.icon}</div><div class="gn">${ex.name}</div><div class="gd">${ex.desc}</div><div class="gl">${G[ex.stat]} pts</div>`;
        c.onclick=()=>{if(G.hunger<20){msg('For sulten!');return;}G.hunger-=20;advTime(2);startTrain(ex);};
        g.appendChild(c);
    });
    document.getElementById('gym-ov').classList.add('active');
}

// ===== 4 UNIQUE MINI-GAMES =====
let tAF=null,tState={};
function startTrain(ex){
    S.click();document.getElementById('gym-ov').classList.remove('active');
    document.getElementById('train-ov').classList.add('active');G.scene='train';
    document.getElementById('tt').textContent=ex.icon+' '+ex.name;
    document.getElementById('ts').textContent='';document.getElementById('tr').innerHTML='';
    const tc=document.getElementById('tc');tc.width=Math.min(340,innerWidth-20);tc.height=Math.min(300,innerHeight*.38);
    tState={ex,score:0,max:0,phase:'go',done:false};
    switch(ex.game){
        case'mash':trainMash(tc);break;
        case'runner':trainRunner(tc);break;
        case'memory':trainMemory(tc);break;
        case'reaction':trainReaction(tc);break;
    }
}

function endTrain(){
    cancelAnimationFrame(tAF);tState.done=true;
    const ex=tState.ex,sc=tState.score,mx=tState.max||1;
    const p=Math.min(1,sc/mx);const gain=Math.max(1,Math.floor(p*3+1));
    G[ex.stat]+=gain;G.charmPts+=1;G.charmTotal+=1;
    float('+'+gain+' '+ex.name,'#ffbe0b');
    let gr,gc;if(p>.8){gr='PERFEKT!';gc='#ffbe0b';S.perf();}else if(p>.5){gr='GODT!';gc='#00d4aa';S.ok();}else{gr='OK';gc='#ff6b35';S.click();}
    document.getElementById('ti').textContent='';
    document.getElementById('tr').innerHTML=`<div style="text-align:center;margin-top:10px"><div class="pix" style="font-size:clamp(9px,2.5vw,14px);color:${gc};margin-bottom:5px">${gr}</div><div class="pix" style="font-size:clamp(5px,1.2vw,8px);color:#ffbe0b;margin-bottom:3px">+${gain} ${ex.stat.toUpperCase()}</div><div class="pix" style="font-size:clamp(3px,.8vw,5px);color:#888;margin-bottom:10px">DMG:${G.dmg} HP:${G.maxHP} MP:${G.maxMP} BLK:${G.blockChance}%</div><button class="btn btn-s" onclick="document.getElementById('train-ov').classList.remove('active');openGym();updHUD();">VIDERE</button></div>`;
}

// GAME 1: BUTTON MASH (styrke)
function trainMash(tc){
    const x=tc.getContext('2d'),W=tc.width,H=tc.height;
    tState.max=40;let count=0,timeLeft=5,started=false,lastT=Date.now();
    document.getElementById('ti').textContent='TAP SГ… HURTIGT DU KAN! рҹ’Ә';
    const tap=()=>{if(tState.done)return;if(!started){started=true;lastT=Date.now();}count++;tState.score=count;S.click();};
    tc.addEventListener('mousedown',tap);tc.addEventListener('touchstart',tap);document.addEventListener('keydown',tap);
    (function draw(){if(tState.done){tc.removeEventListener('mousedown',tap);tc.removeEventListener('touchstart',tap);document.removeEventListener('keydown',tap);return;}
        if(started){timeLeft=5-(Date.now()-lastT)/1000;if(timeLeft<=0){tState.score=count;endTrain();return;}}
        x.clearRect(0,0,W,H);
        // Bar
        const pct=count/tState.max;
        x.fillStyle='rgba(255,255,255,.05)';x.fillRect(W*.1,H*.4,W*.8,30);
        x.fillStyle='#ff006e';x.fillRect(W*.1,H*.4,W*.8*Math.min(1,pct),30);
        // Count
        x.font="bold 28px 'Press Start 2P'";x.textAlign='center';x.fillStyle='#fff';x.fillText(count,W/2,H*.32);
        x.font="10px 'Press Start 2P'";x.fillStyle='#ffbe0b';x.fillText(started?timeLeft.toFixed(1)+'s':'TAP FOR AT STARTE!',W/2,H*.58);
        // Animated fist
        const fs=count%2===0?1:.9;
        x.font=`${30*fs}px serif`;x.fillText('рҹ‘Ҡ',W/2,H*.78);
        document.getElementById('ts').textContent=count+'/'+tState.max;
        tAF=requestAnimationFrame(draw);
    })();
}

// GAME 2: RUNNER (cardio)
function trainRunner(tc){
    const x=tc.getContext('2d'),W=tc.width,H=tc.height;
    tState.max=10;let py=H*.7,vy=0,onG=true,obs=[],score=0,dist=0,spd=2,alive=true;
    document.getElementById('ti').textContent='TAP FOR AT HOPPE! рҹҸғ';
    for(let i=0;i<10;i++)obs.push({x:W+i*100+Math.random()*60,h:15+Math.random()*15});
    const jump=()=>{if(!alive||tState.done)return;if(onG){vy=-8;onG=false;S.click();}};
    tc.addEventListener('mousedown',jump);tc.addEventListener('touchstart',jump);document.addEventListener('keydown',jump);
    (function draw(){if(tState.done){tc.removeEventListener('mousedown',jump);tc.removeEventListener('touchstart',jump);document.removeEventListener('keydown',jump);return;}
        x.clearRect(0,0,W,H);
        // Ground
        const gY=H*.78;x.fillStyle='#2a2a2a';x.fillRect(0,gY,W,H-gY);
        x.strokeStyle='rgba(255,255,255,.06)';for(let i=0;i<W;i+=20){x.beginPath();x.moveTo((i-dist*2)%W,gY);x.lineTo((i-dist*2)%W,gY+3);x.stroke();}
        // Player
        vy+=.4;py+=vy;if(py>=gY-16){py=gY-16;vy=0;onG=true;}
        const legOff=Math.sin(dist*.1)*4;
        x.fillStyle='#ff006e';x.fillRect(50,py,12,16);// body
        x.fillStyle='#c68642';x.beginPath();x.arc(56,py-5,6,0,Math.PI*2);x.fill();// head
        x.fillStyle='#1e293b';x.fillRect(50,py+16+legOff,5,6);x.fillRect(57,py+16-legOff,5,6);// legs
        // Obstacles
        obs.forEach(o=>{
            o.x-=spd;if(o.x<-20){o.x=W+50+Math.random()*80;o.h=15+Math.random()*20;score++;tState.score=score;}
            x.fillStyle='#ffbe0b';x.fillRect(o.x,gY-o.h,12,o.h);
            // Collision
            if(alive&&o.x>40&&o.x<70&&py+16>gY-o.h){alive=false;S.bad();tState.score=score;setTimeout(endTrain,500);}
        });
        dist+=spd;spd=2+dist*.001;
        // Score
        x.font="bold 10px 'Press Start 2P'";x.textAlign='right';x.fillStyle='#00d4aa';x.fillText('SCORE: '+score,W-10,20);
        document.getElementById('ts').textContent=score+'/'+tState.max;
        if(score>=tState.max&&alive){tState.score=score;endTrain();return;}
        tAF=requestAnimationFrame(draw);
    })();
}

// GAME 3: MEMORY SEQUENCE (small talk)
function trainMemory(tc){
    const x=tc.getContext('2d'),W=tc.width,H=tc.height;
    tState.max=6;
    const colors=['#ff006e','#ffbe0b','#00d4aa','#3b82f6'];
    const emojis=['рҹҳҺ','рҹ—ЈпёҸ','рҹ’¬','рҹӨҷ'];
    const positions=[[W*.25,H*.35],[W*.75,H*.35],[W*.25,H*.7],[W*.75,H*.7]];
    const btnR=Math.min(30,W*.1);
    let seq=[],pIdx=0,round=0,showPhase=true,showIdx=0,lastShow=0,canTap=false,wrong=false;

    function nextRound(){round++;seq.push(Math.floor(Math.random()*4));showPhase=true;showIdx=0;canTap=false;pIdx=0;lastShow=Date.now();
        document.getElementById('ti').textContent='Husk sekvensen! рҹ§ ';}
    nextRound();

    function drawBtns(lit){
        x.clearRect(0,0,W,H);
        x.font="bold 8px 'Press Start 2P'";x.textAlign='center';x.fillStyle='#888';x.fillText('RUNDE '+round+'/'+tState.max,W/2,20);
        positions.forEach((p,i)=>{
            const isLit=lit===i;
            x.fillStyle=isLit?colors[i]:'rgba(255,255,255,.06)';
            x.beginPath();x.arc(p[0],p[1],btnR,0,Math.PI*2);x.fill();
            if(isLit){x.shadowColor=colors[i];x.shadowBlur=12;x.beginPath();x.arc(p[0],p[1],btnR,0,Math.PI*2);x.fill();x.shadowBlur=0;}
            x.font="18px serif";x.fillText(emojis[i],p[0],p[1]+6);
        });
    }

    const tap=e=>{if(!canTap||tState.done||wrong)return;
        const rect=tc.getBoundingClientRect();
        const mx=(e.clientX||e.touches[0].clientX)-rect.left,my=(e.clientY||e.touches[0].clientY)-rect.top;
        const sx=tc.width/rect.width,sy=tc.height/rect.height;
        const cx2=mx*sx,cy=my*sy;
        let hit=-1;positions.forEach((p,i)=>{if(Math.hypot(cx2-p[0],cy-p[1])<btnR+5)hit=i;});
        if(hit<0)return;
        drawBtns(hit);S.click();
        if(hit===seq[pIdx]){pIdx++;
            if(pIdx>=seq.length){tState.score=round;S.ok();
                if(round>=tState.max){setTimeout(endTrain,400);return;}
                setTimeout(()=>nextRound(),600);}
        } else{wrong=true;S.bad();tState.score=Math.max(0,round-1);setTimeout(endTrain,600);}
    };
    tc.addEventListener('mousedown',tap);tc.addEventListener('touchstart',tap);

    (function draw(){if(tState.done){tc.removeEventListener('mousedown',tap);tc.removeEventListener('touchstart',tap);return;}
        if(showPhase){const now=Date.now();
            if(now-lastShow>600){drawBtns(seq[showIdx]);lastShow=now;showIdx++;
                if(showIdx>seq.length){showPhase=false;canTap=true;drawBtns(-1);document.getElementById('ti').textContent='Din tur! Gentag sekvensen! рҹ‘Ҷ';}
            } else if(now-lastShow>400){drawBtns(-1);}
        }
        document.getElementById('ts').textContent=round+'/'+tState.max;
        tAF=requestAnimationFrame(draw);
    })();
}

// GAME 4: REACTION (reflex)
function trainReaction(tc){
    const x=tc.getContext('2d'),W=tc.width,H=tc.height;
    tState.max=12;let targets=[],score=0,spawned=0,spawnT=0;
    document.getElementById('ti').textContent='TAP cirklerne hurtigt! вҡЎ';

    function spawn(){if(spawned>=18)return;targets.push({x:30+Math.random()*(W-60),y:30+Math.random()*(H-60),r:18,life:1,born:Date.now()});spawned++;}

    const tap=e=>{if(tState.done)return;
        const rect=tc.getBoundingClientRect();
        const mx=((e.clientX||e.touches[0].clientX)-rect.left)*(tc.width/rect.width);
        const my=((e.clientY||e.touches[0].clientY)-rect.top)*(tc.height/rect.height);
        for(let i=targets.length-1;i>=0;i--){
            if(Math.hypot(mx-targets[i].x,my-targets[i].y)<targets[i].r+5){
                targets.splice(i,1);score++;tState.score=score;S.click();float('HIT!','#00d4aa');
                if(score>=tState.max){endTrain();return;}break;
            }
        }
    };
    tc.addEventListener('mousedown',tap);tc.addEventListener('touchstart',tap);

    (function draw(){if(tState.done){tc.removeEventListener('mousedown',tap);tc.removeEventListener('touchstart',tap);return;}
        x.clearRect(0,0,W,H);
        const now=Date.now();if(now-spawnT>800&&spawned<18){spawn();spawnT=now;}
        targets=targets.filter(t=>{
            t.life=1-Math.min(1,(now-t.born)/2000);
            if(t.life<=0){S.bad();return false;}
            x.globalAlpha=t.life;x.fillStyle='#ff006e';x.shadowColor='#ff006e';x.shadowBlur=8;
            x.beginPath();x.arc(t.x,t.y,t.r*t.life,0,Math.PI*2);x.fill();
            x.fillStyle='#fff';x.font='12px serif';x.textAlign='center';x.fillText('рҹҺҜ',t.x,t.y+4);
            x.shadowBlur=0;x.globalAlpha=1;return true;
        });
        x.font="bold 9px 'Press Start 2P'";x.textAlign='right';x.fillStyle='#ffbe0b';x.fillText(score+'/'+tState.max,W-8,16);
        document.getElementById('ts').textContent=score+'/'+tState.max;
        tAF=requestAnimationFrame(draw);
    })();
}

function canUnlock(id){
    if(id==='root')return!G.perks.root&&G.charmPts>=0;
    for(const k in skillTree){if(skillTree[k].children.includes(id)&&G.perks[k])return!G.perks[id]&&G.charmPts>=skillTree[id].cost;}
    return false;
}

function openTree(){
    G.scene='tree';
    document.getElementById('tree-sub').textContent='Charm Points: '+G.charmPts+' | VГҰlg din vej!';
    const w=document.getElementById('tree-w');w.innerHTML='';
    G.perks.root=true;
    // Render tree visually
    function renderRow(ids){
        const row=document.createElement('div');row.className='tree-row';
        ids.forEach(id=>{
            const s=skillTree[id];if(!s)return;
            const unlocked=G.perks[id];const can=canUnlock(id);
            const d=document.createElement('div');
            d.className='tn'+(unlocked?' on':can?'':' off');
            d.innerHTML=`<div class="ti">${s.icon}</div><div class="tt">${s.name}</div><div class="td">${s.desc}</div><div class="tc" style="color:${unlocked?'#00d4aa':'#ff006e'}">${unlocked?'вң…':s.cost+' PTS'}</div>`;
            if(can&&!unlocked)d.onclick=()=>{G.charmPts-=s.cost;G.perks[id]=true;if(s.effect)s.effect();S.perf();float('UNLOCKED!','#ffbe0b');openTree();updHUD();};
            row.appendChild(d);
        });
        w.appendChild(row);
    }
    function addLines(){const c=document.createElement('div');c.className='tree-con';c.innerHTML='<div class="tree-line"></div>';w.appendChild(c);}

    // Root
    renderRow(['root']);addLines();
    // 3 branches
    renderRow(['combat','defense','social']);addLines();
    // Sub branches
    renderRow(['dmg1','crit','hp1','block1','mp1','regen']);addLines();
    // Ultimates
    renderRow(['berserker','tank','rizz']);

    document.getElementById('tree-ov').classList.add('active');
}

function pAtk(type){
    S.click();document.getElementById('c-menu').style.display='none';
    let base;
    if(type==='dans'){base=G.dmg;cSpeech('Hanzi: "Watch this move!" рҹ•ә');}
    else if(type==='line'){base=G.dmg+G.smalltalk*2;C.hMP=Math.max(0,C.hMP-5);cSpeech('Hanzi: "Er du fra himlen? For du ligner en engel" рҹҳҸ');}
    else{base=G.dmg+G.styrke*2;C.hMP=Math.max(0,C.hMP-8);cSpeech('Hanzi: *flexer biceps* рҹ’Әрҹ”Ҙ');}
    if(G.perks.berserker&&type==='flex')base*=2;
    updC();
    doTiming(q=>{
        const hitRoll=Math.random()*100;
        const hitChance=60+G.hitBonus+(q==='perfect'?20:q==='good'?10:0);
        if(hitRoll>hitChance){S.bad();cAct('MISS!','#ff006e');cSpeech('Misset! рҹҳӨ');updC();chkEnd()||setTimeout(eTurn,2200);return;}
        let mult=q==='perfect'?1.8:q==='good'?1.3:q==='ok'?1:.6;
        let dmg=Math.max(1,Math.floor(base*mult));
        C.gHP=Math.max(0,C.gHP-dmg);
        if(q==='perfect'){S.perf();cAct('PERFEKT! -'+dmg,'#ffbe0b');}
        else if(q==='good'){S.ok();cAct('-'+dmg,'#00d4aa');}
        else{S.click();cAct('-'+dmg,'#aaa');}
        updC();chkEnd()||setTimeout(eTurn,2200);
    });
}

function doTiming(cb){
    const bar=document.getElementById('c-timing');bar.style.display='block';
    const zone=document.getElementById('c-zone'),needle=document.getElementById('c-needle');
    const zs=30+Math.random()*20,zw=12+Math.max(0,G.reflex)*1.2;
    zone.style.left=zs+'%';zone.style.width=Math.min(35,zw)+'%';
    let pos=0,spd=1.3+G.round*.25,active=true;
    const tap=()=>{if(!active)return;active=false;
        document.removeEventListener('keydown',tap);document.removeEventListener('touchstart',tap);
        bar.style.display='none';
        const inZ=pos>=zs&&pos<=zs+zw,cd=Math.abs(pos-(zs+zw/2));
        cb(inZ&&cd<zw*.2?'perfect':inZ?'good':Math.abs(pos-zs)<7||Math.abs(pos-(zs+zw))<7?'ok':'miss');
    };
    document.addEventListener('keydown',tap);document.addEventListener('touchstart',tap);
    (function a(){if(!active)return;pos+=spd;if(pos>=100||pos<=0)spd*=-1;pos=Math.max(0,Math.min(100,pos));
        needle.style.left=pos+'%';requestAnimationFrame(a);})();
}

function eTurn(){
    const g=C.girl,atk=g.attacks[Math.floor(Math.random()*g.attacks.length)];
    cSpeech(g.name+': "'+atk+'"');cAct('рҹ’¬','#ff006e');
    const readTime=Math.max(2000,atk.length*70+800);
    setTimeout(()=>{
        cSpeech('TAP for at DODGE! рҹӣЎпёҸ');
        doTiming(q=>{
            const blocked=Math.random()*100<G.blockChance;
            let red=q==='perfect'?1:q==='good'?.6:q==='ok'?.3:0;
            if(blocked)red=Math.max(red,.5);
            let dmg=Math.max(1,Math.floor(g.atk*(1-red)));
            C.hHP=Math.max(0,C.hHP-dmg);
            if(q==='perfect'){cAct('DODGE!','#00d4aa');cSpeech('Perfekt dodge! Ingen skade!');}
            else if(blocked){S.click();cAct('BLOCK! -'+dmg,'#3b82f6');cSpeech('Blokeret noget! -'+dmg);}
            else{S.hit();cAct('-'+dmg+' OUCH!','#ff006e');cSpeech('"'+atk+'" -'+dmg+'!');
                document.getElementById('c-hanzi').style.animation='shake .3s';setTimeout(()=>document.getElementById('c-hanzi').style.animation='',300);}
            updC();chkEnd()||setTimeout(showCMenu,2000);
        });
    },800);
}

        const W=cv.width,H=cv.height,t=Date.now()*.001;
        cx.fillStyle='#050510';cx.fillRect(0,0,W,H);
        for(let i=0;i<60;i++){cx.fillStyle=`rgba(255,255,255,${.1+Math.sin(t*2+i)*.08})`;cx.fillRect((i*173+30)%W,(i*67+15)%(H*.6),1.5,1.5);}
        // City silhouette
        const gY=H*.65;
        for(let i=0;i<10;i++){const bx=i*W/9-5,bw=W/11,bh=25+((i*47)%45);
            cx.fillStyle='#0d0820';cx.fillRect(bx,gY-bh,bw,bh+H);
            for(let wy=gY-bh+6;wy<gY;wy+=9)for(let wx=bx+3;wx<bx+bw-3;wx+=11){
                cx.fillStyle=Math.sin(wx*7+wy*3+t)>.3?'rgba(255,190,11,.15)':'rgba(0,0,0,.2)';cx.fillRect(wx,wy,5,5);}}
    }
    else if(['map','gym','shop','work','tree','train','bodega'].includes(G.scene)){drawMap();}
    requestAnimationFrame(loop);
}

    S.init();Mus.init();S.ok();
    document.getElementById('title-ov').style.display='none';
    playVid('video/intro.mp4',()=>initPhone());
};
document.getElementById('ph-next').onclick=advPh;
loop();
</script>
