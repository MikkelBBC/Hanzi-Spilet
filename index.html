<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Hanzi Lad Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none}
canvas#cv{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.pix{font-family:'Press Start 2P',monospace}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:none;padding:6px 10px;background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(0,0,0,.4) 85%,transparent);pointer-events:none}
#hud.show{display:block}
.hr{display:flex;justify-content:space-between;align-items:flex-start}
.hl{display:flex;flex-direction:column;gap:2px}
.hb{display:flex;align-items:center;gap:3px}
.hb .l{font-family:'Press Start 2P';font-size:clamp(7px,1.8vw,10px);width:24px;text-align:right}
.hb .t{width:clamp(50px,12vw,90px);height:8px;background:rgba(255,255,255,.08);overflow:hidden;border-radius:3px}
.hb .f{height:100%;transition:width .4s;border-radius:3px}
.hb .v{font-family:'Press Start 2P';font-size:clamp(6px,1.5vw,9px);min-width:22px}
.hstats{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
.hs{display:flex;align-items:center;gap:2px}
.hs .si{font-size:clamp(7px,1.5vw,10px)}
.hs .sl{font-family:'Press Start 2P';font-size:clamp(6px,1.4vw,8px);opacity:.5}
.hs .sv{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);font-weight:700}
.hright{text-align:right;display:flex;flex-direction:column;gap:1px}
.hright .ck{font-family:'Press Start 2P';font-size:clamp(9px,2.2vw,13px);color:#ffbe0b}
.hright .dy{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);color:#ff006e}
.hright .mn{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);color:#00d4aa}

/* MSG */
.msg-bar{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);max-width:420px;width:90%;z-index:12;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
.msg-bar.show{opacity:1}
.msg-bar .msg{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px);padding:10px 14px;background:rgba(0,0,0,.92);border:1px solid rgba(255,255,255,.08);line-height:1.8}

/* OVERLAYS */
.ov{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;background:rgba(5,5,15,.96)}
.ov.active{display:flex}
.ov-t{font-family:'Press Start 2P';font-size:clamp(8px,2vw,11px);margin:8px 0 3px;letter-spacing:1px}
.ov-s{font-family:'Press Start 2P';font-size:clamp(6px,1.4vw,8px);color:#aaa;margin-bottom:10px;text-align:center;line-height:1.8}

/* BTNS */
.btn{font-family:'Press Start 2P';font-size:clamp(8px,1.8vw,11px);padding:11px 20px;border:2px solid #ff006e;background:transparent;color:#ff006e;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn:active{background:#ff006e;color:#fff;transform:scale(.95)}
.btn-s{font-size:clamp(7px,1.5vw,9px);padding:8px 14px}

/* GYM GRID */
.gym-g{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;max-width:340px;width:100%}
.gym-c{padding:10px 6px;border:2px solid rgba(255,255,255,.08);background:rgba(0,0,0,.5);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.gym-c:active{border-color:#ff006e;transform:scale(.96)}
.gym-c .gi{font-size:1.4rem}.gym-c .gn{font-family:'Press Start 2P';font-size:clamp(7px,1.6vw,10px)}
.gym-c .gd{font-family:'Press Start 2P';font-size:clamp(6px,1.2vw,8px);color:#aaa;line-height:1.6}
.gym-c .gl{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);color:#ffbe0b}

/* SHOP */
.stabs{display:flex;gap:3px;margin-bottom:8px}
.stab{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);padding:6px 12px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#888;cursor:pointer;-webkit-tap-highlight-color:transparent}
.stab.act{border-color:#ffbe0b;color:#ffbe0b;background:rgba(255,190,11,.06)}
.slist{display:flex;flex-direction:column;gap:5px;max-width:360px;width:100%;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.si{padding:8px 10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.015);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.si:active{border-color:#ffbe0b;transform:scale(.98)}
.si.dis{opacity:.18;pointer-events:none}
.si-l{display:flex;align-items:center;gap:6px}
.si-i{font-size:1rem}.si-n{font-size:clamp(7px,1.6vw,10px);font-weight:700}
.si-d{font-family:'Press Start 2P';font-size:clamp(6px,1.2vw,8px);color:#888;margin-top:1px}
.si-p{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);color:#ffbe0b}

/* SKILL TREE */
.tree{max-width:380px;width:100%;max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tree-row{display:flex;justify-content:center;gap:6px;margin-bottom:4px}
.tree-con{display:flex;justify-content:center;margin-bottom:4px}
.tree-line{width:2px;height:10px;background:rgba(255,190,11,.15)}
.tree-split{display:flex;gap:40px;justify-content:center;align-items:flex-start}
.tree-split .tree-line{width:2px;height:10px}
.tn{padding:8px 10px;border:2px solid rgba(255,190,11,.12);background:rgba(255,190,11,.02);cursor:pointer;text-align:center;min-width:clamp(80px,22vw,110px);transition:all .2s;-webkit-tap-highlight-color:transparent}
.tn.on{border-color:#ffbe0b;background:rgba(255,190,11,.1)}
.tn.off{opacity:.3;cursor:default}
.tn:active:not(.off):not(.on){border-color:#ff006e;transform:scale(.97)}
.tn .ti{font-size:1.1rem}.tn .tt{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);margin-top:2px}
.tn .td{font-family:'Press Start 2P';font-size:clamp(5px,1.1vw,7px);color:#888;margin-top:2px;line-height:1.5}
.tn .tc{font-family:'Press Start 2P';font-size:clamp(6px,1.2vw,8px);margin-top:3px}

/* COMBAT */
.cui{position:fixed;inset:0;z-index:22;display:none;flex-direction:column}
.cui.active{display:flex}
.ctop{display:flex;justify-content:space-between;padding:6px 8px;background:rgba(0,0,0,.75);z-index:2}
.cbars{display:flex;flex-direction:column;gap:1px}
.cname{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);margin-bottom:2px}
.crow{display:flex;align-items:center;gap:4px}
.crow label{font-family:'Press Start 2P';font-size:clamp(5px,1vw,7px);width:18px}
.ctrk{width:clamp(60px,18vw,100px);height:7px;background:rgba(255,255,255,.08);overflow:hidden;border-radius:3px}
.ctrk .cf{height:100%;transition:width .3s;border-radius:3px}
.crow .cv{font-family:'Press Start 2P';font-size:clamp(5px,1vw,7px)}
.cmid{flex:1;position:relative;overflow:hidden}
.cact{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P';font-size:clamp(12px,3.5vw,18px);text-shadow:0 0 14px currentColor;opacity:0;transition:opacity .3s;pointer-events:none;z-index:3}
.cact.show{opacity:1}
/* Speech bubble */
.cspeech{position:absolute;top:12%;left:50%;transform:translateX(-50%);max-width:90%;width:90%;padding:14px 18px;background:rgba(0,0,0,.92);border:2px solid #ff006e;border-radius:12px;font-family:'Press Start 2P';font-size:clamp(8px,2.2vw,11px);line-height:2.2;text-align:center;z-index:3;opacity:0;transition:opacity .3s;pointer-events:none}
.cspeech.show{opacity:1}
.cspeech::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #ff006e}
.cbot{padding:6px;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);display:flex;flex-direction:column;align-items:center;gap:5px;z-index:2}
.ctiming{max-width:260px;width:78%;height:18px;background:rgba(255,255,255,.06);position:relative;display:none;margin-bottom:4px}
.ctiming .zone{position:absolute;height:100%;background:rgba(0,212,170,.22)}
.ctiming .needle{position:absolute;top:0;width:3px;height:100%;background:#fff;box-shadow:0 0 6px #fff}
.cmenu{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:400px;width:100%}
.cbtn{font-family:'Press Start 2P';font-size:clamp(6px,1.5vw,8px);padding:12px 6px;border:2px solid;background:rgba(0,0,0,.5);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.cbtn:active{transform:scale(.95)}
.cbtn .ci{font-size:1.1rem}.cbtn .cc{font-size:clamp(5px,1.1vw,7px);opacity:.5}
.citems{display:flex;gap:3px;max-width:340px;width:100%;overflow-x:auto;display:none}
.citem{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);padding:7px 10px;border:1px solid rgba(255,190,11,.25);background:rgba(255,190,11,.04);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.citem.dis{opacity:.25;pointer-events:none}

/* PHONE */
.phone-ov{position:fixed;inset:0;z-index:25;display:none;align-items:center;justify-content:center;background:#0a0a0f}
.phone-ov.active{display:flex}
.phone{width:min(300px,84vw);height:min(540px,80vh);background:#111;border-radius:20px;border:2px solid #222;overflow:hidden;display:flex;flex-direction:column}
.phtop{background:#0a0a0a;padding:8px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #222}
.phavi{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.phname{font-weight:700;font-size:.7rem}.phst{font-size:.45rem;color:#00d4aa}
.phmsgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;scroll-behavior:smooth}
.mb{max-width:80%;padding:6px 10px;border-radius:12px;font-size:clamp(.58rem,1.5vw,.7rem);line-height:1.5;animation:mIn .3s ease;word-wrap:break-word;white-space:pre-line}
.mb-in{background:#1a1a2e;border-bottom-left-radius:2px;align-self:flex-start;color:#ddd}
.mb-out{background:#ff006e;border-bottom-right-radius:2px;align-self:flex-end;color:#fff}
.mb-nar{background:transparent;align-self:center;color:#555;font-size:.5rem;font-style:italic}
.phbot{padding:8px;border-top:1px solid #222;display:flex;justify-content:center}
.phcont{font-family:'Press Start 2P';font-size:clamp(7px,1.5vw,9px);padding:8px 18px;border:1px solid #ff006e;background:rgba(255,0,110,.08);color:#ff006e;cursor:pointer;-webkit-tap-highlight-color:transparent}
.phcont:active{background:#ff006e;color:#fff}

/* TITLE */
.title-ov{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,12,.95)}
.title-ov h1{font-family:'Press Start 2P';font-size:clamp(14px,4.5vw,28px);color:#ff006e;text-shadow:0 0 18px rgba(255,0,110,.4),0 2px 0 #aa0048;margin-bottom:3px;letter-spacing:2px}
.title-ov .sub{font-family:'Press Start 2P';font-size:clamp(4px,1.2vw,8px);color:#ffbe0b;letter-spacing:4px;margin-bottom:24px}

/* VIDEO */
#intro-vid{position:fixed;inset:0;z-index:40;width:100%;height:100%;object-fit:cover;display:none;background:#000}
#vid-skip{position:fixed;bottom:20px;right:20px;z-index:41;display:none}

/* WHEEL */
.wheel-ov{position:fixed;inset:0;z-index:32;display:none;flex-direction:column;align-items:center;justify-content:center;background:#05050f;overflow-y:auto;padding:10px 0}
.wheel-ov.active{display:flex}
.wheel-wrap{position:relative;width:min(280px,70vw);height:min(280px,70vw);margin:10px 0}
.wheel-wrap canvas{width:100%;height:100%}
.wheel-ptr{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:1.5rem;z-index:2}
#settings-btn{transition:opacity .2s}
#settings-btn:hover{opacity:1!important}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);color:#ddd;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
.set-row:active{border-color:#ff006e;background:rgba(255,0,110,.08)}

/* EVENT */
.event-ov{position:fixed;inset:0;z-index:32;display:none;flex-direction:column;align-items:center;justify-content:center;background:#05050f;padding:15px}
.event-ov.active{display:flex}
.ev-choices{display:flex;flex-direction:column;gap:6px;max-width:320px;width:100%;margin-top:10px}
.ev-btn{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);padding:12px 10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);color:#ddd;cursor:pointer;text-align:left;line-height:1.8;transition:all .2s;-webkit-tap-highlight-color:transparent}
.ev-btn:active{border-color:#ff006e;transform:scale(.97);background:rgba(255,0,110,.1)}

/* DAY TRANSITION */
.day-flash{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#cc0000;opacity:0;pointer-events:none;transition:opacity .3s}
.day-flash.show{opacity:1;pointer-events:auto}
.day-flash .df-day{font-family:'Press Start 2P';font-size:clamp(16px,5vw,32px);color:#fff;margin-bottom:8px;text-shadow:0 2px 0 #900}
.day-flash .df-sub{font-family:'Press Start 2P';font-size:clamp(8px,2.2vw,14px);color:rgba(255,255,255,.85);text-align:center;line-height:2}

/* LORE MSG */
.lore-bar{position:fixed;top:50px;left:50%;transform:translateX(-50%);max-width:380px;width:88%;z-index:14;text-align:center;pointer-events:none;opacity:0;transition:opacity .4s}
.lore-bar.show{opacity:1}
.lore-bar .lore{font-family:'Press Start 2P';font-size:clamp(6px,1.3vw,8px);padding:10px 14px;background:rgba(0,180,120,.15);border:1px solid rgba(0,212,170,.3);color:#00d4aa;line-height:2}

/* CREDITS */
.credits-ov{position:fixed;inset:0;z-index:35;display:none;flex-direction:column;align-items:center;justify-content:center;background:#050510;overflow-y:auto;padding:20px}
.credits-ov.active{display:flex}

/* FLOATS */
.float{position:fixed;font-family:'Press Start 2P';font-size:clamp(5px,1.4vw,8px);pointer-events:none;z-index:100;animation:fUp 1s ease forwards;text-shadow:0 0 8px currentColor}
@keyframes fUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-35px)}}
@keyframes mIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud"></div>
<div class="msg-bar" id="msg-bar"><div class="msg" id="msg-text"></div></div>
<div class="lore-bar" id="lore-bar"><div class="lore" id="lore-text"></div></div>
<div class="day-flash" id="day-flash"><div class="df-day" id="df-day"></div><div class="df-sub" id="df-sub"></div></div>
<div class="credits-ov" id="credits-ov"></div>

<!-- VIDEO -->
<video id="intro-vid" playsinline></video>
<button class="btn" id="vid-skip" onclick="skipVid()">SKIP ▶</button>

<!-- LETH BRIEFING -->
<div class="ov" id="brief-ov" style="justify-content:center;background:rgba(5,5,12,.98)">
<canvas id="brief-cv" width="380" height="220" style="max-width:92%;margin-bottom:8px;border:1px solid rgba(255,255,255,.04)"></canvas>
<div class="pix" id="brief-name" style="font-size:clamp(7px,1.8vw,10px);color:#00d4aa;margin-bottom:4px"></div>
<div class="pix" id="brief-text" style="font-size:clamp(7px,1.6vw,10px);color:#ddd;max-width:340px;text-align:center;line-height:2;margin-bottom:10px"></div>
<div id="brief-girl" style="display:none;text-align:center;margin-bottom:10px">
<div class="pix" id="bg-icon" style="font-size:2.5rem;margin-bottom:4px"></div>
<div class="pix" id="bg-name" style="font-size:clamp(7px,1.8vw,10px);color:#ff006e;margin-bottom:3px"></div>
<div class="pix" id="bg-rating" style="font-size:clamp(10px,3vw,16px);color:#ffbe0b;margin-bottom:4px"></div>
<div class="pix" id="bg-stats" style="font-size:clamp(6px,1.3vw,8px);color:#aaa;line-height:2"></div>
</div>
<button class="btn btn-s" id="brief-btn" onclick="advBrief()">FORTSÆT ▶</button>
</div>

<!-- TITLE -->
<div class="title-ov" id="title-ov">
<h1>HANZI LAD</h1>
<div class="sub">SIMULATOR</div>
<button class="btn" id="start-btn">▶ START</button>
</div>

<!-- PHONE -->
<div class="phone-ov" id="phone-ov">
<div class="phone"><div class="phtop"><div class="phavi" style="background:#00d4aa;">L</div><div><div class="phname">Leth 💪</div><div class="phst">Online</div></div></div>
<div class="phmsgs" id="ph-msgs"></div>
<div class="phbot"><button class="phcont" id="ph-next">FORTSÆT ▶</button></div></div>
</div>

<!-- GYM -->
<div class="ov" id="gym-ov">
<canvas id="gym-bg" width="400" height="160" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#ff006e">💪 LETH'S GYM</div>
<div class="ov-s" id="gym-sub">Leth: "Vælg øvelse! Koster 20 sult."</div>
<div class="gym-g" id="gym-g"></div>
<button class="btn btn-s" style="margin-top:10px" onclick="closeOv()">← TILBAGE</button>
</div>

<!-- TRAINING -->
<div class="ov" id="train-ov" style="justify-content:center;">
<div style="display:flex;justify-content:space-between;width:100%;max-width:340px;margin-bottom:4px;"><span class="pix" id="tt" style="font-size:clamp(5px,1.2vw,7px);color:#ff006e"></span><span class="pix" id="ts" style="font-size:clamp(5px,1.2vw,7px);color:#ffbe0b"></span></div>
<canvas id="tc" width="340" height="300" style="max-width:100%;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.4);"></canvas>
<div id="ti" class="pix" style="font-size:clamp(3.5px,.85vw,5px);color:#888;text-align:center;margin-top:4px"></div>
<div id="tr"></div>
</div>

<!-- SHOP -->
<div class="ov" id="shop-ov">
<canvas id="shop-bg" width="400" height="140" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#8b5cf6">GULLE'S SHOP</div>
<div class="ov-s">Gulle: "Alt er ægte... mostly." 🕶️</div>
<div class="stabs" id="shop-tabs"></div>
<div class="slist" id="shop-list"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#8b5cf6;color:#8b5cf6" onclick="closeOv()">← TILBAGE</button>
</div>

<!-- WORK -->
<div class="ov" id="work-ov">
<canvas id="work-bg" width="400" height="140" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#00d4aa">RITARDO'S JOBS</div>
<div class="ov-s" id="work-sub"></div>
<div class="slist" id="work-list"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#00d4aa;color:#00d4aa" onclick="closeOv()">← TILBAGE</button>
</div>

<!-- SKILL TREE -->
<div class="ov" id="tree-ov">
<div class="ov-t" style="color:#ffbe0b">🌟 CHARM SKILL TREE</div>
<div class="ov-s" id="tree-sub"></div>
<div class="tree" id="tree-w"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#ffbe0b;color:#ffbe0b" onclick="closeOv()">← TILBAGE</button>
</div>

<!-- BODEGA -->
<div class="ov" id="bodega-ov" style="justify-content:center;background:rgba(5,5,15,.97)">
<canvas id="bodega-bg" width="400" height="160" style="max-width:100%;margin-bottom:4px;"></canvas>
<div class="ov-t" style="color:#f59e0b">🍺 BODEGA</div>
<div class="ov-s" id="bodega-sub">Prøv din charm på de lokale!</div>
<div class="slist" id="bodega-list"></div>
<button class="btn btn-s" style="margin-top:10px;border-color:#f59e0b;color:#f59e0b" onclick="closeOv()">← TILBAGE</button>
</div>

<!-- LUCKY WHEEL -->
<div class="wheel-ov" id="wheel-ov">
<div class="ov-t" style="color:#ffbe0b">🎰 LYKKEHJUL</div>
<div class="ov-s" id="wheel-sub">Spin og test din lykke!</div>
<div class="wheel-wrap"><div class="wheel-ptr">▼</div><canvas id="wheel-cv" width="280" height="280"></canvas></div>
<button class="btn" id="wheel-spin-btn" onclick="spinWheel()">🎰 SPIN!</button>
<div class="pix" id="wheel-result" style="font-size:clamp(7px,1.6vw,10px);margin-top:10px;text-align:center;line-height:2;max-width:300px"></div>
</div>

<!-- DAILY EVENT -->
<div class="event-ov" id="event-ov">
<div class="pix" id="ev-icon" style="font-size:2.5rem;margin-bottom:6px"></div>
<div class="pix" id="ev-name" style="font-size:clamp(8px,2vw,12px);color:#00d4aa;margin-bottom:4px"></div>
<div class="pix" id="ev-text" style="font-size:clamp(6px,1.4vw,9px);color:#ddd;max-width:320px;text-align:center;line-height:2;margin-bottom:6px"></div>
<div class="ev-choices" id="ev-choices"></div>
</div>

<!-- COMBAT -->
<div class="cui" id="combat-ui">
<div class="ctop"><div class="cbars" id="c-hanzi"></div><div class="cbars" id="c-girl"></div></div>
<div class="cmid" id="c-mid"><div class="cspeech" id="c-speech"></div><div class="cact" id="c-act"></div><canvas id="c-cv" style="position:absolute;inset:0;width:100%;height:100%;"></canvas></div>
<div class="cbot"><div class="ctiming" id="c-timing"><div class="zone" id="c-zone"></div><div class="needle" id="c-needle"></div></div><div class="cmenu" id="c-menu"></div><div class="citems" id="c-items"></div></div>
</div>

<!-- RESULT -->
<div class="ov" id="result-ov" style="justify-content:center;background:rgba(5,5,12,.97)"></div>

<script src="game.js"></script>
</body>
</html>
