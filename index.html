<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hanzi Lad Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0f;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none;}
        #app{width:100vw;height:100vh;position:relative;overflow:hidden;}

        /* ===== TITLE ===== */
        #title{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#1a0030,#0a0a0f 70%);z-index:10;}
        #title h1{font-family:'Orbitron',sans-serif;font-size:clamp(2.5rem,9vw,5rem);font-weight:900;background:linear-gradient(135deg,#ff006e,#ff6b35,#ffbe0b,#ff006e);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:grad 3s ease infinite;filter:drop-shadow(0 0 25px rgba(255,0,110,0.4));margin-bottom:6px;}
        #title .sub{font-family:'Orbitron',sans-serif;font-size:clamp(0.5rem,2vw,0.9rem);color:#ff6b35;letter-spacing:6px;margin-bottom:15px;opacity:0.7;}
        #title .tagline{font-size:clamp(0.6rem,1.8vw,0.8rem);color:#aaa;margin-bottom:35px;text-align:center;max-width:80%;line-height:1.6;}
        .btn{font-family:'Orbitron',sans-serif;font-size:clamp(0.75rem,2vw,1rem);font-weight:700;padding:14px 40px;border:2px solid #ff006e;background:transparent;color:#ff006e;cursor:pointer;letter-spacing:3px;transition:all 0.3s;border-radius:6px;-webkit-tap-highlight-color:transparent;}
        .btn:active{background:#ff006e;color:#fff;transform:scale(0.96);}
        .btn-sm{font-size:clamp(0.6rem,1.5vw,0.75rem);padding:10px 24px;letter-spacing:2px;}
        .btn-green{border-color:#00d4aa;color:#00d4aa;}
        .btn-green:active{background:#00d4aa;color:#000;}
        .btn-purple{border-color:#8b5cf6;color:#8b5cf6;}
        .btn-purple:active{background:#8b5cf6;color:#fff;}

        /* ===== PHONE CALL ===== */
        #phone-scene{position:absolute;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:#0a0a0f;z-index:10;}
        .phone{width:min(340px,88vw);height:min(620px,85vh);background:#1a1a2e;border-radius:30px;border:3px solid #2a2a3e;position:relative;overflow:hidden;display:flex;flex-direction:column;}
        .phone-top{background:#111;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2a2a3e;}
        .phone-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff006e,#ff6b35);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;}
        .phone-name{font-weight:700;font-size:0.85rem;}
        .phone-status{font-size:0.6rem;color:#00d4aa;}
        .phone-msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
        .msg-bubble{max-width:82%;padding:10px 14px;border-radius:16px;font-size:clamp(0.7rem,1.8vw,0.82rem);line-height:1.5;animation:msgIn 0.3s ease;word-wrap:break-word;}
        .msg-in{background:#2a2a3e;border-bottom-left-radius:4px;align-self:flex-start;color:#ddd;}
        .msg-out{background:#ff006e;border-bottom-right-radius:4px;align-self:flex-end;color:#fff;}
        .msg-narrator{background:transparent;align-self:center;color:#666;font-size:0.65rem;font-style:italic;text-align:center;}
        .phone-bottom{padding:12px 16px;border-top:1px solid #2a2a3e;display:flex;justify-content:center;}
        .phone-continue{font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:700;padding:10px 28px;border:1px solid #ff006e;background:rgba(255,0,110,0.1);color:#ff006e;cursor:pointer;border-radius:20px;transition:all 0.2s;-webkit-tap-highlight-color:transparent;letter-spacing:0.5px;}
        .phone-continue:active{background:#ff006e;color:#fff;}
        @keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

        /* ===== MAP ===== */
        #map-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;background:#0a0a12;z-index:10;}
        .map-hud{padding:10px 15px;background:rgba(0,0,0,0.6);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;border-bottom:1px solid rgba(255,255,255,0.06);}
        .stats-wrap{display:flex;gap:8px;flex-wrap:wrap;}
        .mini-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
        .mini-stat label{font-family:'Orbitron',sans-serif;font-size:0.4rem;letter-spacing:1px;opacity:0.5;}
        .mini-stat .track{width:clamp(44px,10vw,75px);height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
        .mini-stat .fill{height:100%;border-radius:4px;transition:width 0.5s;}
        .mini-stat .val{font-family:'Orbitron',sans-serif;font-size:0.45rem;font-weight:700;color:#ddd;}
        .hud-info{text-align:right;font-family:'Orbitron',sans-serif;}
        .hud-info .day-timer{font-size:clamp(0.65rem,1.8vw,0.85rem);font-weight:900;color:#ff006e;}
        .hud-info .money{font-size:clamp(0.55rem,1.5vw,0.75rem);color:#ffbe0b;margin-top:2px;}
        .hud-info .energi{font-size:0.5rem;color:#00d4aa;margin-top:2px;}

        .map-area{flex:1;position:relative;overflow:hidden;}
        .map-bg{position:absolute;top:0;left:0;width:100%;height:100%;}
        .map-bg canvas{width:100%;height:100%;}

        .map-locations{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:12px;padding:15px;}
        .loc-card{width:clamp(120px,28vw,155px);height:clamp(130px,22vh,160px);background:rgba(15,15,30,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all 0.3s;backdrop-filter:blur(10px);-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
        .loc-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 30%,var(--glow) 0%,transparent 70%);opacity:0.08;transition:opacity 0.3s;}
        .loc-card:active{transform:scale(0.95);border-color:var(--glow);}
        .loc-card:active::before{opacity:0.2;}
        .loc-card .loc-icon{font-size:2.2rem;}
        .loc-card .loc-name{font-family:'Orbitron',sans-serif;font-size:clamp(0.5rem,1.3vw,0.65rem);font-weight:700;letter-spacing:1px;}
        .loc-card .loc-cost{font-size:0.5rem;opacity:0.4;}
        .loc-card.locked{opacity:0.3;pointer-events:none;}
        .loc-card .loc-badge{position:absolute;top:8px;right:8px;font-size:0.45rem;font-family:'Orbitron',sans-serif;padding:2px 6px;border-radius:8px;font-weight:700;}

        .map-msg{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);max-width:90%;text-align:center;font-size:clamp(0.6rem,1.5vw,0.72rem);padding:10px 18px;background:rgba(0,0,0,0.8);border-radius:12px;border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);opacity:0;transition:opacity 0.4s;pointer-events:none;line-height:1.5;}
        .map-msg.show{opacity:1;}

        /* ===== LOCATION OVERLAYS ===== */
        .overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:20;background:rgba(5,5,15,0.97);padding:15px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
        .ov-title{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,3vw,1.4rem);font-weight:900;letter-spacing:3px;margin:10px 0 5px;}
        .ov-sub{font-size:0.6rem;color:#aaa;margin-bottom:15px;text-align:center;}

        /* GYM */
        .gym-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:400px;width:100%;}
        .gym-card{padding:16px 12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);border-radius:14px;cursor:pointer;transition:all 0.25s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
        .gym-card:active{transform:scale(0.96);border-color:#ff006e;background:rgba(255,0,110,0.1);}
        .gym-card .gi{font-size:2rem;}
        .gym-card .gn{font-family:'Orbitron',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:1px;}
        .gym-card .gs{font-size:0.5rem;opacity:0.4;}
        .gym-card .gl{font-family:'Orbitron',sans-serif;font-size:0.55rem;color:#ffbe0b;margin-top:2px;}

        /* TRAINING */
        #train-ov .train-area{display:flex;flex-direction:column;align-items:center;width:100%;}
        #train-ov canvas{max-width:100%;border-radius:12px;margin:10px 0;}
        .train-info{display:flex;justify-content:space-between;width:100%;max-width:380px;margin-bottom:5px;}
        .train-info span{font-family:'Orbitron',sans-serif;font-size:0.65rem;}
        .train-instr{font-size:0.6rem;color:#aaa;text-align:center;margin-top:8px;letter-spacing:0.5px;}
        .train-result{text-align:center;margin-top:20px;}
        .train-result h2{font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,4vw,2rem);margin-bottom:8px;}
        .train-result .xp-gain{font-family:'Orbitron',sans-serif;font-size:clamp(0.9rem,2.5vw,1.2rem);color:#ffbe0b;margin-bottom:6px;}
        .train-result .grade{font-size:0.7rem;color:#aaa;margin-bottom:20px;}

        /* SHOP */
        .shop-list{display:flex;flex-direction:column;gap:8px;max-width:400px;width:100%;max-height:65vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-right:5px;}
        .shop-row{padding:12px 14px;border:1px solid rgba(139,92,246,0.2);background:rgba(139,92,246,0.04);border-radius:12px;cursor:pointer;transition:all 0.25s;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent;}
        .shop-row:active{border-color:#8b5cf6;background:rgba(139,92,246,0.12);transform:scale(0.98);}
        .shop-row.bought{opacity:0.25;pointer-events:none;}
        .sr-left{display:flex;align-items:center;gap:10px;}
        .sr-icon{font-size:1.3rem;}
        .sr-name{font-size:0.7rem;font-weight:700;}
        .sr-stat{font-size:0.5rem;color:#8b5cf6;}
        .sr-price{font-family:'Orbitron',sans-serif;font-size:0.65rem;color:#ffbe0b;font-weight:700;}

        /* CLUB */
        #club-ov{background:rgba(10,0,16,0.98);}
        #club-ov canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
        .club-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:100%;height:100%;padding:15px;}
        .club-girl-card{text-align:center;margin-bottom:10px;}
        .club-girl-card .cg-icon{font-size:3rem;}
        .club-girl-card .cg-name{font-family:'Orbitron',sans-serif;font-size:0.85rem;font-weight:900;color:#ff006e;margin-top:4px;}
        .club-girl-card .cg-diff{font-size:0.5rem;color:#aaa;letter-spacing:1px;}
        .club-box{max-width:460px;width:95%;background:rgba(0,0,0,0.85);border:1px solid rgba(255,0,110,0.2);border-radius:14px;padding:16px;backdrop-filter:blur(15px);margin-bottom:10px;}
        .club-box .cb-speaker{font-family:'Orbitron',sans-serif;font-size:0.55rem;color:#ff006e;letter-spacing:2px;margin-bottom:6px;}
        .club-box .cb-text{font-size:clamp(0.65rem,1.7vw,0.78rem);line-height:1.6;color:#ddd;}
        .club-choices{display:flex;flex-direction:column;gap:8px;max-width:460px;width:95%;margin-bottom:12px;}
        .club-ch{font-family:'Inter',sans-serif;font-size:clamp(0.6rem,1.5vw,0.7rem);padding:12px 14px;border:1px solid rgba(255,0,110,0.2);background:rgba(255,0,110,0.05);color:#ddd;cursor:pointer;border-radius:10px;transition:all 0.25s;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;}
        .club-ch:active{border-color:#ff006e;background:rgba(255,0,110,0.15);transform:scale(0.98);}
        .club-ch .ch-pct{font-family:'Orbitron',sans-serif;font-size:0.55rem;font-weight:700;white-space:nowrap;padding:3px 8px;border-radius:6px;}
        .pct-high{color:#00d4aa;background:rgba(0,212,170,0.12);}
        .pct-mid{color:#ffbe0b;background:rgba(255,190,11,0.12);}
        .pct-low{color:#ff006e;background:rgba(255,0,110,0.12);}

        /* WORK */
        .work-options{display:flex;flex-direction:column;gap:10px;max-width:400px;width:100%;margin-top:10px;}
        .work-card{padding:16px;border:1px solid rgba(0,212,170,0.2);background:rgba(0,212,170,0.04);border-radius:12px;cursor:pointer;transition:all 0.25s;-webkit-tap-highlight-color:transparent;}
        .work-card:active{border-color:#00d4aa;background:rgba(0,212,170,0.12);transform:scale(0.98);}
        .work-card .wk-name{font-weight:700;font-size:0.75rem;margin-bottom:4px;}
        .work-card .wk-info{font-size:0.55rem;color:#aaa;}

        /* RESULT */
        #result-ov{justify-content:center;}
        .result-box{text-align:center;}
        .result-box .r-icon{font-size:4rem;margin-bottom:15px;}
        .result-box h2{font-family:'Orbitron',sans-serif;font-size:clamp(1.5rem,5vw,2.5rem);margin-bottom:10px;}
        .result-box .r-desc{font-size:0.75rem;color:#aaa;max-width:360px;line-height:1.6;margin:0 auto 20px;}
        .result-box .r-score{font-family:'Orbitron',sans-serif;font-size:clamp(0.8rem,2vw,1rem);color:#ffbe0b;margin-bottom:25px;}

        /* LETH TIPS */
        .leth-tip{display:none;position:absolute;bottom:60px;left:50%;transform:translateX(-50%);max-width:90%;width:380px;background:rgba(0,0,0,0.9);border:1px solid rgba(0,212,170,0.3);border-radius:14px;padding:14px 16px;z-index:25;animation:msgIn 0.3s ease;}
        .leth-tip .lt-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
        .leth-tip .lt-avi{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00d4aa,#047857);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;}
        .leth-tip .lt-name{font-family:'Orbitron',sans-serif;font-size:0.55rem;color:#00d4aa;letter-spacing:1px;}
        .leth-tip .lt-text{font-size:0.7rem;line-height:1.5;color:#ccc;}
        .leth-tip .lt-close{font-family:'Orbitron',sans-serif;font-size:0.5rem;padding:6px 16px;border:1px solid rgba(0,212,170,0.3);background:transparent;color:#00d4aa;cursor:pointer;border-radius:8px;margin-top:10px;-webkit-tap-highlight-color:transparent;}

        /* FLOAT TEXT */
        .float-text{position:fixed;font-family:'Orbitron',sans-serif;font-size:clamp(0.8rem,2.2vw,1.1rem);font-weight:900;pointer-events:none;z-index:100;animation:floatUp 1.2s ease forwards;text-shadow:0 0 10px currentColor;}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-50px) scale(1.3);}}
        @keyframes grad{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
    </style>
</head>
<body>
<div id="app">

    <!-- TITLE -->
    <div id="title">
        <h1>HANZI LAD</h1>
        <div class="sub">S I M U L A T O R</div>
        <div class="tagline">Hanzi var engang nummer 1. Nu starter comebacket.</div>
        <button class="btn" id="start-btn">START</button>
    </div>

    <!-- PHONE SCENE -->
    <div id="phone-scene">
        <div class="phone">
            <div class="phone-top">
                <div class="phone-avatar">L</div>
                <div><div class="phone-name">Leth 💪</div><div class="phone-status">Online</div></div>
            </div>
            <div class="phone-msgs" id="phone-msgs"></div>
            <div class="phone-bottom">
                <button class="phone-continue" id="phone-next">Fortsæt ▶</button>
            </div>
        </div>
    </div>

    <!-- MAP -->
    <div id="map-screen">
        <div class="map-hud">
            <div class="stats-wrap" id="hud-stats"></div>
            <div class="hud-info">
                <div class="day-timer" id="hud-timer">KLUB OM 7 DAGE</div>
                <div class="money" id="hud-money">200 KR</div>
                <div class="energi" id="hud-energi">ENERGI: 5/5</div>
            </div>
        </div>
        <div class="map-area">
            <div class="map-bg"><canvas id="map-canvas"></canvas></div>
            <div class="map-locations" id="map-locs"></div>
            <div class="map-msg" id="map-msg"></div>
            <div class="leth-tip" id="leth-tip">
                <div class="lt-header"><div class="lt-avi">L</div><div class="lt-name">LETH</div></div>
                <div class="lt-text" id="lt-text"></div>
                <button class="lt-close" id="lt-close">OK 👊</button>
            </div>
        </div>
    </div>

    <!-- GYM -->
    <div class="overlay" id="gym-ov">
        <div class="ov-title" style="color:#ff006e;">💪 FITNESSCENTER</div>
        <div class="ov-sub">Vælg en øvelse (-1 energi)</div>
        <div class="gym-grid" id="gym-grid"></div>
        <button class="btn btn-sm" style="margin-top:18px;" onclick="closeOv()">GÅ UD</button>
    </div>

    <!-- TRAINING -->
    <div class="overlay" id="train-ov">
        <div class="train-area">
            <div class="train-info"><span id="t-title" style="color:#ff006e;"></span><span id="t-score" style="color:#ffbe0b;"></span></div>
            <canvas id="t-canvas" width="360" height="360"></canvas>
            <div class="train-instr" id="t-instr"></div>
            <div id="t-result"></div>
        </div>
    </div>

    <!-- SHOP -->
    <div class="overlay" id="shop-ov">
        <div class="ov-title" style="color:#8b5cf6;">👔 STYLE SHOP</div>
        <div class="ov-sub">Upgrade din look</div>
        <div class="shop-list" id="shop-list"></div>
        <button class="btn btn-sm btn-purple" style="margin-top:15px;" onclick="closeOv()">GÅ UD</button>
    </div>

    <!-- WORK -->
    <div class="overlay" id="work-ov">
        <div class="ov-title" style="color:#00d4aa;">💰 ARBEJDE</div>
        <div class="ov-sub">Tjen penge (-1 energi)</div>
        <div class="work-options" id="work-opts"></div>
        <button class="btn btn-sm btn-green" style="margin-top:18px;" onclick="closeOv()">GÅ HJEM</button>
    </div>

    <!-- CLUB -->
    <div class="overlay" id="club-ov">
        <canvas id="club-canvas"></canvas>
        <div class="club-content">
            <div class="club-girl-card" id="club-girl-info"></div>
            <div class="club-box"><div class="cb-speaker" id="cb-speaker"></div><div class="cb-text" id="cb-text"></div></div>
            <div class="club-choices" id="club-choices"></div>
            <button class="btn btn-sm" id="club-leave" style="display:none;" onclick="leaveClub()">SMUT HJEM</button>
        </div>
    </div>

    <!-- RESULT -->
    <div class="overlay" id="result-ov">
        <div class="result-box" id="result-box"></div>
    </div>
</div>

<script>
// ===== AUDIO =====
const S={ctx:null,mg:null,oscs:[],playing:false,
init(){this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.mg=this.ctx.createGain();this.mg.gain.value=0.25;this.mg.connect(this.ctx.destination);},
n(f,d,t='square',v=0.3){if(!this.ctx)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d);o.connect(g);g.connect(this.mg);o.start();o.stop(this.ctx.currentTime+d);},
click(){this.n(800,0.06);setTimeout(()=>this.n(1200,0.05),30);},
ok(){this.n(523,0.12);setTimeout(()=>this.n(659,0.12),80);setTimeout(()=>this.n(784,0.15),160);},
bad(){this.n(350,0.15,'sawtooth');setTimeout(()=>this.n(260,0.2,'sawtooth'),120);},
perf(){this.n(784,0.1);setTimeout(()=>this.n(988,0.1),60);setTimeout(()=>this.n(1175,0.15),120);},
coin(){for(let i=0;i<4;i++)setTimeout(()=>this.n(900+i*200,0.06,'sine'),i*40);},
ring(){for(let i=0;i<3;i++)setTimeout(()=>{this.n(880,0.15,'sine',0.2);setTimeout(()=>this.n(1100,0.1,'sine',0.15),100);},i*400);},
startClub(){if(this.playing)return;this.playing=true;this._cl();},
_cl(){if(!this.playing||!this.ctx)return;const n=this.ctx.currentTime,b=60/128;for(let i=0;i<8;i++){const t=n+i*b;const ko=this.ctx.createOscillator(),kg=this.ctx.createGain();ko.type='sine';ko.frequency.setValueAtTime(150,t);ko.frequency.exponentialRampToValueAtTime(40,t+0.1);kg.gain.setValueAtTime(0.35,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.15);ko.connect(kg);kg.connect(this.mg);ko.start(t);ko.stop(t+0.15);this.oscs.push(ko);if(i%2===1){const h=this.ctx.createOscillator(),hg=this.ctx.createGain();h.type='square';h.frequency.value=5500;hg.gain.setValueAtTime(0.03,t);hg.gain.exponentialRampToValueAtTime(0.001,t+0.04);h.connect(hg);hg.connect(this.mg);h.start(t);h.stop(t+0.04);this.oscs.push(h);}if(i%4===0){const bs=this.ctx.createOscillator(),bg=this.ctx.createGain();bs.type='sawtooth';bs.frequency.value=[110,130,146,110][(i/4)%4];bg.gain.setValueAtTime(0.07,t);bg.gain.exponentialRampToValueAtTime(0.001,t+b*2);bs.connect(bg);bg.connect(this.mg);bs.start(t);bs.stop(t+b*2);this.oscs.push(bs);}}setTimeout(()=>this._cl(),(8*b)*1000);},
stopClub(){this.playing=false;this.oscs.forEach(o=>{try{o.stop();}catch(e){}});this.oscs=[];}};

    xpNeed(lv){return 20+lv*18;},
    bought:[],
    girlsMet:0,totalScore:0,
    scene:'title',
    tutorial:0,
    addXP(stat,amt){
        this.xp[stat]+=amt;
        while(this.xp[stat]>=this.xpNeed(this.stats[stat])){
            this.xp[stat]-=this.xpNeed(this.stats[stat]);
            this.stats[stat]++;
            floatText('LEVEL UP! '+stat.toUpperCase()+' LV'+this.stats[stat],'#ffbe0b');
        }
    },
    totalLvl(){return Object.values(this.stats).reduce((a,b)=>a+b,0);},
    chance(stat,req){
        const lv=this.stats[stat]||1;
        const pct=Math.min(95,Math.max(10, 30+(lv-req)*12 ));
        return pct;
    }
};

function startTraining(ex){
    S.click();hide('gym-ov');show('train-ov');G.scene='training';

    switch(ex.id){
        case'bench':trainBench(tc);break;

        case'squats':trainSquats(tc);break;
        case'treadmill':tState.maxReps=20;trainTread(tc);break;
    }
}

function endTraining(){
    cancelAnimationFrame(tRAF);
    const ex=tState.ex;
    const maxS=tState.maxReps*(ex.id==='treadmill'?2:10);
    const pct=tState.score/maxS;
    const xpGain=Math.max(1,Math.floor(pct*18+4));
    G.addXP(ex.stat,xpGain);
    let grade,gc;
    if(pct>0.85){grade='PERFEKT!';gc='#ffbe0b';S.perf();}
    else if(pct>0.6){grade='GODT!';gc='#00d4aa';S.ok();}
    else if(pct>0.3){grade='OK';gc='#ff6b35';S.click();}
    else{grade='SVAGT...';gc='#ff006e';S.bad();}
    document.getElementById('t-instr').textContent='';
    document.getElementById('t-result').innerHTML=`<div class="train-result"><h2 style="color:${gc}">${grade}</h2><div class="xp-gain">+${xpGain} ${ex.stat.toUpperCase()} XP</div><div class="grade">${ex.name} → LV${G.stats[ex.stat]}</div><button class="btn btn-sm" onclick="hide('train-ov');openGym();updateHUD();">VIDERE</button></div>`;
}

// BENCH
function trainBench(tc){
    const cx=tc.getContext('2d'),W=tc.width,H=tc.height;
    let pos=0,dir=1,spd=0.022,wait=true;
    const gz={min:0.7,max:0.9};
    const tap=()=>{if(!wait||tState.phase!=='active')return;wait=false;
        const inG=pos>=gz.min&&pos<=gz.max,inY=pos>=0.5&&pos<gz.min;
        let p=inG?10:inY?5:1;
        if(inG){S.perf();floatText('PERFEKT!','#ffbe0b');}else if(inY){S.ok();floatText('GODT!','#00d4aa');}else{S.bad();floatText('MISS','#ff006e');}
        tState.score+=p;tState.reps++;document.getElementById('t-score').textContent=tState.reps+'/'+tState.maxReps;
        if(tState.reps>=tState.maxReps){tState.phase='done';setTimeout(endTraining,300);return;}
        spd+=0.003;setTimeout(()=>{wait=true;},250);};
    document.addEventListener('keydown',tap);tc.addEventListener('touchstart',tap);tc.addEventListener('mousedown',tap);
    function draw(){if(tState.phase==='done'){document.removeEventListener('keydown',tap);tc.removeEventListener('touchstart',tap);tc.removeEventListener('mousedown',tap);return;}
        cx.clearRect(0,0,W,H);pos+=dir*spd;if(pos>=1||pos<=0)dir*=-1;pos=Math.max(0,Math.min(1,pos));
        const tX=W/2-18,tW=36,tH=H-30,tY=15;
        cx.fillStyle='rgba(255,255,255,0.06)';cx.fillRect(tX,tY,tW,tH);
        const gy1=tY+tH*(1-gz.max),gy2=tY+tH*(1-gz.min);
        cx.fillStyle='rgba(0,212,170,0.2)';cx.fillRect(tX,gy1,tW,gy2-gy1);
        cx.fillStyle='rgba(255,190,11,0.1)';cx.fillRect(tX,gy2,tW,tH*0.2);
        const iY=tY+tH*(1-pos);
        cx.fillStyle='#ff006e';cx.shadowColor='#ff006e';cx.shadowBlur=12;
        cx.fillRect(tX-4,iY-3,tW+8,6);cx.shadowBlur=0;
        cx.fillStyle='#555';cx.font='bold 10px Orbitron';cx.textAlign='left';
        cx.fillText('POWER',tX+tW+10,(gy1+gy2)/2+4);
        cx.fillStyle='#fff';cx.font='bold 12px Orbitron';cx.textAlign='center';
        cx.fillText('TAP!',W/2,H-4);
        tRAF=requestAnimationFrame(draw);}
    draw();
}

// CURLS
function trainCurls(tc){
    const cx=tc.getContext('2d'),W=tc.width,H=tc.height;
    let targets=[],hzY=H-50;
    function spawn(){targets.push({x:W/2+(Math.random()-0.5)*100,y:0,spd:2+tState.reps*0.25,hit:false,miss:false});}
    spawn();let st=0;
    const tap=()=>{if(tState.phase!=='active')return;
        const t=targets.find(t=>!t.hit&&!t.miss&&Math.abs(t.y-hzY)<22);
        if(t){t.hit=true;const d=Math.abs(t.y-hzY);let p=d<7?10:d<16?6:3;tState.score+=p;
            if(p>=10){S.perf();floatText('PERFEKT!','#ffbe0b');}else if(p>=6){S.ok();floatText('GODT!','#00d4aa');}else{S.click();}
            tState.reps++;document.getElementById('t-score').textContent=tState.reps+'/'+tState.maxReps;
            if(tState.reps>=tState.maxReps){tState.phase='done';setTimeout(endTraining,300);return;}}else S.bad();};
    document.addEventListener('keydown',tap);tc.addEventListener('touchstart',tap);tc.addEventListener('mousedown',tap);
    function draw(){if(tState.phase==='done'){document.removeEventListener('keydown',tap);tc.removeEventListener('touchstart',tap);tc.removeEventListener('mousedown',tap);return;}
        cx.clearRect(0,0,W,H);
        cx.strokeStyle='rgba(255,0,110,0.4)';cx.lineWidth=2;cx.beginPath();cx.moveTo(W/2-55,hzY);cx.lineTo(W/2+55,hzY);cx.stroke();
        cx.fillStyle='rgba(255,0,110,0.06)';cx.fillRect(W/2-55,hzY-18,110,36);
        targets.forEach(t=>{if(t.hit){cx.fillStyle='rgba(0,212,170,0.4)';cx.beginPath();cx.arc(t.x,t.y,16,0,Math.PI*2);cx.fill();}
        else if(!t.miss){t.y+=t.spd;if(t.y>H+20)t.miss=true;
        const d=Math.abs(t.y-hzY);const c=d<22?'#ff006e':'#8b5cf6';cx.fillStyle=c;cx.shadowColor=c;cx.shadowBlur=d<22?12:4;
        cx.beginPath();cx.arc(t.x,t.y,12,0,Math.PI*2);cx.fill();cx.shadowBlur=0;}});
        st++;if(st>55&&targets.filter(t=>!t.hit&&!t.miss).length===0&&tState.reps<tState.maxReps){spawn();st=0;}
        cx.fillStyle='#fff';cx.font='bold 11px Orbitron';cx.textAlign='center';cx.fillText('TAP NÅR ● RAMMER LINJEN',W/2,H-4);
        tRAF=requestAnimationFrame(draw);}
    draw();
}

// SQUATS
function trainSquats(tc){
    const cx=tc.getContext('2d'),W=tc.width,H=tc.height;
    let ring=110,tgt=32,spd=0.7,wait=true;
    const tap=()=>{if(!wait||tState.phase!=='active')return;wait=false;
        const d=Math.abs(ring-tgt);let p=d<4?10:d<12?6:d<25?3:0;
        if(p>=10){S.perf();floatText('PERFEKT!','#ffbe0b');}else if(p>=6){S.ok();floatText('GODT!','#00d4aa');}else if(p>0){S.click();}else{S.bad();floatText('MISS','#ff006e');}
        tState.score+=p;tState.reps++;document.getElementById('t-score').textContent=tState.reps+'/'+tState.maxReps;
        if(tState.reps>=tState.maxReps){tState.phase='done';setTimeout(endTraining,300);return;}
        ring=90+Math.random()*40;spd+=0.08;setTimeout(()=>{wait=true;},250);};
    document.addEventListener('keydown',tap);tc.addEventListener('touchstart',tap);tc.addEventListener('mousedown',tap);
    function draw(){if(tState.phase==='done'){document.removeEventListener('keydown',tap);tc.removeEventListener('touchstart',tap);tc.removeEventListener('mousedown',tap);return;}
        cx.clearRect(0,0,W,H);ring-=spd;if(ring<8)ring=90+Math.random()*40;
        cx.strokeStyle='rgba(255,0,110,0.35)';cx.lineWidth=3;cx.beginPath();cx.arc(W/2,H/2,tgt,0,Math.PI*2);cx.stroke();
        const d=Math.abs(ring-tgt);const c=d<4?'#ffbe0b':d<12?'#00d4aa':d<25?'#8b5cf6':'rgba(255,255,255,0.2)';
        cx.strokeStyle=c;cx.lineWidth=3;if(d<12){cx.shadowColor=c;cx.shadowBlur=12;}
        cx.beginPath();cx.arc(W/2,H/2,ring,0,Math.PI*2);cx.stroke();cx.shadowBlur=0;
        cx.fillStyle='#fff';cx.font='bold 11px Orbitron';cx.textAlign='center';cx.fillText('TAP NÅR CIRKLERNE MATCHER',W/2,H-4);
        tRAF=requestAnimationFrame(draw);}
    draw();
}

// TREADMILL
function trainTread(tc){
    const cx=tc.getContext('2d'),W=tc.width,H=tc.height;
    let exp='left',timeLeft=10,last=Date.now(),streak=0;
    const tap=(e)=>{if(tState.phase!=='active')return;let side=null;
        if(e.type==='keydown'){if(e.key==='ArrowLeft'||e.key==='a')side='left';if(e.key==='ArrowRight'||e.key==='d')side='right';}
        else{const r=tc.getBoundingClientRect();const tx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;side=tx<W/2?'left':'right';}
        if(!side)return;
        if(side===exp){tState.score+=2;streak++;if(streak>3)S.perf();else S.ok();tState.reps++;exp=exp==='left'?'right':'left';document.getElementById('t-score').textContent=tState.reps+'';}
        else{streak=0;S.bad();}};
    document.addEventListener('keydown',tap);tc.addEventListener('touchstart',tap);tc.addEventListener('mousedown',tap);
    function draw(){const now=Date.now();timeLeft-=(now-last)/1000;last=now;
        if(timeLeft<=0||tState.phase==='done'){tState.phase='done';document.removeEventListener('keydown',tap);tc.removeEventListener('touchstart',tap);tc.removeEventListener('mousedown',tap);setTimeout(endTraining,200);return;}
        cx.clearRect(0,0,W,H);
        const la=exp==='left';
        cx.fillStyle=la?'rgba(255,0,110,0.15)':'rgba(255,255,255,0.02)';cx.fillRect(0,0,W/2,H);
        cx.fillStyle=!la?'rgba(255,0,110,0.15)':'rgba(255,255,255,0.02)';cx.fillRect(W/2,0,W/2,H);
        cx.strokeStyle='rgba(255,255,255,0.08)';cx.lineWidth=2;cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();
        cx.font='36px sans-serif';cx.textAlign='center';
        cx.fillStyle=la?'#ff006e':'rgba(255,255,255,0.12)';cx.fillText('👟',W/4,H/2);
        cx.fillStyle=!la?'#ff006e':'rgba(255,255,255,0.12)';cx.fillText('👟',W*3/4,H/2);
        cx.font='bold 13px Orbitron';cx.fillStyle='#fff';cx.fillText('L',W/4,H/2+40);cx.fillText('R',W*3/4,H/2+40);
        cx.fillStyle='#ffbe0b';cx.font='bold 16px Orbitron';cx.fillText(Math.ceil(timeLeft)+'s',W/2,28);
        if(streak>3){cx.fillStyle='#ff006e';cx.font='bold 11px Orbitron';cx.fillText('STREAK x'+streak+'!',W/2,H-10);}
        tRAF=requestAnimationFrame(draw);}
    draw();
}

let curGirl,curLine,clubScore;

function openClub(){
    G.scene='club';show('club-ov');
    const cc=document.getElementById('club-canvas');
    cc.width=window.innerWidth;cc.height=window.innerHeight;
    renderClubBG(cc);S.startClub();

    const roundGirls=girlsByRound[Math.min(G.round-1,girlsByRound.length-1)];
    curGirl=roundGirls[Math.floor(Math.random()*roundGirls.length)];
    curLine=0;clubScore=0;

    document.getElementById('club-girl-info').innerHTML=`<div class="cg-icon">${curGirl.icon}</div><div class="cg-name">${curGirl.name}</div><div class="cg-diff">${curGirl.diff}</div>`;
    clubDialog('FORTÆLLER',`Hanzi træder ind. Bassen banker. Du ser ${curGirl.name}...`);
    document.getElementById('club-leave').style.display='none';
    setTimeout(()=>showClubLine(),2000);
}

function renderClubBG(cc){
    const cx=cc.getContext('2d');let t=0;
    function draw(){if(G.scene!=='club')return;cx.fillStyle='#0a0010';cx.fillRect(0,0,cc.width,cc.height);t+=0.02;
        const fY=cc.height*0.55;
        for(let x=0;x<cc.width;x+=45)for(let y=fY;y<cc.height;y+=45){cx.fillStyle=`hsl(${(x+y+t*100)%360},65%,${15+Math.sin(t*2+x*0.04)*7}%)`;cx.fillRect(x+1,y+1,43,43);}
        for(let i=0;i<5;i++){cx.strokeStyle=`hsla(${(t*50+i*70)%360},100%,55%,0.15)`;cx.lineWidth=2;cx.beginPath();cx.moveTo(cc.width*(0.1+i*0.18),0);cx.lineTo(cc.width*(0.1+i*0.18)+Math.sin(t+i)*cc.height*0.3,cc.height);cx.stroke();}
        cx.fillStyle='#aaa';cx.beginPath();cx.arc(cc.width/2,45,16,0,Math.PI*2);cx.fill();
        requestAnimationFrame(draw);}
    draw();
}

function clubDialog(sp,txt){
    document.getElementById('cb-speaker').textContent=sp;
    document.getElementById('cb-text').textContent=txt;
    document.getElementById('club-choices').innerHTML='';
}

function showClubLine(){
    if(curLine>=curGirl.lines.length){resolveClub();return;}
    const line=curGirl.lines[curLine];
    clubDialog(line.speaker,line.text);
    const ch=document.getElementById('club-choices');ch.innerHTML='';
    line.choices.forEach(c=>{
        const pct=G.chance(c.stat,c.req);
        const pctClass=pct>=65?'pct-high':pct>=40?'pct-mid':'pct-low';
        const btn=document.createElement('button');btn.className='club-ch';
        btn.innerHTML=`<span>${c.text}</span><span class="ch-pct ${pctClass}">${pct}%</span>`;
        btn.onclick=()=>{
            S.click();
            const roll=Math.random()*100;
            const success=roll<pct;
            const bonus=success?Math.max(c.bonus,1):Math.min(c.bonus,-2);
            clubScore+=bonus;
            if(success&&bonus>0){S.ok();clubDialog('✅','Smooth! Hun smiler. Det landede! 😏');floatText('+'+bonus,'#00d4aa');}
            else{S.bad();clubDialog('❌','Yikes... akavet stilhed. 😬');floatText(bonus+'','#ff006e');}
            curLine++;
            setTimeout(()=>showClubLine(),1500);
        };
        ch.appendChild(btn);
    });
}

function resolveClub(){
    const tp=G.stats.styrke+G.stats.style+G.stats.charm+G.stats.arms;
    const th=curGirl.threshold.styrke+curGirl.threshold.style+curGirl.threshold.charm;
    const sb=tp/(th*2);
    const fs=clubScore+sb*6;
    if(fs>6){
        clubDialog('💖',curGirl.win);S.perf();
        G.totalScore+=100;G.girlsMet++;
        floatText('+100 SCORE!','#ff006e');
    }else if(fs>2){
        clubDialog('😐',"'Du er cute, men... nej.' Tæt på!");
        G.totalScore+=25;
    }else{
        clubDialog('💔',curGirl.lose);S.bad();
    }
    document.getElementById('club-choices').innerHTML='';
    document.getElementById('club-leave').style.display='block';
}

function leaveClub(){
    S.stopClub();hide('club-ov');G.scene='map';
    G.round++;G.daysUntilClub=7;G.energi=G.maxEnergi;G.day++;

    if(G.round>G.maxRounds){
        endGame();return;
    }

    const girlScored=G.girlsMet>=G.round-1;
    if(girlScored){
        lethTip(`NICE Hanzi! Du scorede ${curGirl.name}! 🔥 Runde ${G.round} om 7 dage. Pigerne bliver SVÆRERE. Bliv stærkere!`);
    }else{
        lethTip(`Ah bror, ${curGirl.name} var ikke imponeret... Træn hårdere! Runde ${G.round} om 7 dage. Du kan stadig nå det! 💪`);
    }
    buildMap();updateHUD();
}

function endGame(){
    G.scene='end';
    hide('map-screen');show('result-ov');
    const box=document.getElementById('result-box');
    let icon,title,color,desc;
    if(G.girlsMet>=4){icon='👑';title='HANZI ER LEGENDEN!';color='#ffbe0b';desc='ALLE 4 SCORET! Isabella tog din hånd foran hele klubben. TBH drengene bøjer sig. Du er NUMMER 1 IGEN! Leth græder af stolthed. 🔥👑';}
    else if(G.girlsMet>=3){icon='😎';title='HANZI HAR GAME!';color='#00d4aa';desc=`${G.girlsMet} ud af 4 scoret! Stærkt comeback, men Isabella glippede. TBH overvejer at tage dig tilbage...`;}
    else if(G.girlsMet>=1){icon='💪';title='DER ER POTENTIALE';color='#ff6b35';desc=`${G.girlsMet} scoret. Ikke nok til TBH, men Leth siger 'Vi prøver igen næste måned, bror.'`;}
    else{icon='😅';title='HANZI PRØVEDE...';color='#aaa';desc='0 scoret. TBH er stadig ude af rækkevidde. Men hey... der er altid næste sæson!';}
    box.innerHTML=`<div class="r-icon">${icon}</div><h2 style="color:${color}">${title}</h2><div class="r-desc">${desc}</div><div class="r-score">SCORE: ${G.totalScore} | LVL: ${G.totalLvl()} | DAMER: ${G.girlsMet}/4</div><button class="btn" onclick="restartGame()">PRØV IGEN</button>`;
}

function restartGame(){
    G.day=1;G.daysUntilClub=7;G.money=200;G.energi=5;G.maxEnergi=5;G.round=1;
    G.stats={styrke:1,arms:1,ben:1,cardio:1,style:1,charm:1};
    G.xp={styrke:0,arms:0,ben:0,cardio:0,style:0,charm:0};
    G.bought=[];G.girlsMet=0;G.totalScore=0;G.tutorial=0;
    hide('result-ov');
    hide('title');
    initPhone();
}
